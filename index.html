<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Truth Finder v7 — Gold Edition</title>
<style>
  :root {
    --bg:#0a0a0a; --panel:#111111; --panel2:#161616; --border:#2a2418;
    --accent:#c9a961; --accent2:#8a7234; --text:#e8e3d5; --dim:#8a8270;
    --crit:#a83232; --high:#b8702a; --med:#a88830; --low:#3a6b8a;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    font-size: 14px; line-height: 1.45;
    -webkit-font-smoothing: antialiased;
  }
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: linear-gradient(180deg,#0e0c08,#0a0907);
    border-bottom: 1px solid var(--border);
    padding: 8px 10px;
  }
  .ribbon { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .logo { font-weight: 700; letter-spacing: 0.5px; font-size: 14px; color: var(--accent); margin-right: auto; display: flex; align-items: center; gap: 6px; }
  .logo small { color: var(--dim); font-weight: 400; font-size: 10px; letter-spacing: 1px;}
  .btn {
    background: #1a1610; color: var(--text);
    border: 1px solid var(--border);
    padding: 7px 11px; border-radius: 6px;
    font-size: 12px; font-weight: 500;
    cursor: pointer; white-space: nowrap;
    -webkit-appearance: none; -moz-appearance: none; appearance: none;
    font-family: inherit;
  }
  .btn:active { background: #221c12; }
  .btn.primary { background: var(--accent2); color: #0a0a0a; border-color: var(--accent); font-weight: 600;}
  .btn.ghost { background: transparent; }
  .btn.danger { color: var(--crit); border-color: #4a1818; }
  .btn:disabled { opacity: 0.4; }

.filebar {
margin-top: 8px;
display: flex; gap: 6px; align-items: center;
padding: 6px 8px;
background: var(–panel2);
border: 1px solid var(–border);
border-radius: 6px;
}
.filebar .fname { font-size: 11px; color: var(–dim); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;}
.hidden-file { position: absolute; left: -9999px; width: 1px; height: 1px; opacity: 0; pointer-events: none; }

.container { display: flex; min-height: calc(100vh - 110px); }
.sidenav {
width: 180px; flex-shrink: 0;
background: var(–panel);
border-right: 1px solid var(–border);
padding: 8px 6px;
}
.sidenav.collapsed { display: none; }
.navgroup { font-size: 10px; color: var(–dim); text-transform: uppercase; padding: 8px 8px 4px; letter-spacing: 1px; }
.navitem {
display: block; padding: 8px 10px;
font-size: 13px; color: var(–text);
cursor: pointer; border-radius: 5px;
border: 1px solid transparent;
}
.navitem.active { background: #1a1510; color: var(–accent); border-color: var(–border); }
.navitem:active { background: #221b10; }
.main { flex: 1; padding: 12px; min-width: 0; }
.navtoggle { display: none; }

@media (max-width: 720px) {
.sidenav { position: fixed; top: 110px; left: 0; bottom: 0; z-index: 90; width: 220px; overflow-y: auto;}
.navtoggle { display: inline-flex; }
.main { padding: 10px; }
}

.panel {
background: var(–panel);
border: 1px solid var(–border);
border-radius: 8px;
padding: 12px; margin-bottom: 12px;
}
.panel h2 { margin: 0 0 10px; font-size: 15px; color: var(–accent); font-weight: 600;}
.panel h3 { margin: 12px 0 8px; font-size: 13px; color: var(–accent); font-weight: 600;}
.row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 8px; }
.stat {
background: var(–panel2);
border: 1px solid var(–border);
border-radius: 6px;
padding: 8px 10px;
flex: 1; min-width: 120px;
}
.stat .lbl { font-size: 10px; color: var(–dim); text-transform: uppercase; letter-spacing: 1px;}
.stat .val { font-size: 18px; color: var(–accent); font-weight: 600; margin-top: 2px;}

.tablewrap { overflow-x: auto; -webkit-overflow-scrolling: touch; border: 1px solid var(–border); border-radius: 6px;}
table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 500px;}
th, td { padding: 7px 9px; text-align: left; border-bottom: 1px solid var(–border); vertical-align: top;}
th { background: var(–panel2); color: var(–accent); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;}
tr:last-child td { border-bottom: none; }
td.mono, .mono { font-family: ui-monospace, “SF Mono”, Menlo, monospace; font-size: 11px; color: var(–dim); }

.sev { display: inline-block; padding: 2px 7px; border-radius: 3px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;}
.sev.crit { background: var(–crit); color: #fff; }
.sev.high { background: var(–high); color: #fff; }
.sev.med  { background: var(–med);  color: #0a0a0a; }
.sev.low  { background: var(–low);  color: #fff; }

label { display: block; font-size: 11px; color: var(–dim); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.5px;}
input[type=text], input[type=number], input[type=date], textarea, select {
width: 100%;
background: var(–panel2);
color: var(–text);
border: 1px solid var(–border);
border-radius: 5px;
padding: 8px 10px;
font-size: 14px;
font-family: inherit;
-webkit-appearance: none;
}
textarea { min-height: 70px; resize: vertical; }
.formgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
@media (max-width: 600px) { .formgrid { grid-template-columns: 1fr; } }
.formfield { margin-bottom: 8px; }
.formfield.full { grid-column: 1 / -1; }
.toolbar { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
.toolbar input[type=text] { flex: 1; min-width: 150px; }

.progress { height: 4px; background: #1a1610; border-radius: 2px; overflow: hidden; margin-top: 6px; width: 80px;}
.progress > div { height: 100%; background: var(–accent); transition: width 0.2s;}

.toast {
position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
background: #1a1610; color: var(–accent);
border: 1px solid var(–accent2);
padding: 10px 16px; border-radius: 6px;
z-index: 200; font-size: 13px;
box-shadow: 0 4px 16px rgba(0,0,0,0.5);
max-width: 90%;
}
.empty { color: var(–dim); text-align: center; padding: 24px; font-style: italic;}
.pill { display: inline-block; padding: 1px 6px; border-radius: 3px; background: var(–panel2); border: 1px solid var(–border); font-size: 10px; color: var(–dim); margin-right: 4px;}
.helptext { font-size: 11px; color: var(–dim); margin-top: 4px; }
.divider { height: 1px; background: var(–border); margin: 12px 0; }
details { margin: 6px 0; }
summary { cursor: pointer; color: var(–accent); font-size: 12px; padding: 4px 0; }
.codebox {
background: #0a0807; border: 1px solid var(–border); border-radius: 4px;
padding: 6px 8px; font-family: ui-monospace, monospace; font-size: 10px;
color: var(–dim); white-space: pre-wrap; word-break: break-all;
max-height: 240px; overflow: auto;
}
.bar { display: flex; height: 10px; background:#1a1610; border-radius:2px; overflow:hidden; }
.bar > div { height: 100%; }
.barlbl { display:flex; justify-content:space-between; font-size:11px; color:var(–dim); margin-bottom:2px; }
.trendrow { margin-bottom: 6px; }

@media print {
.topbar, .sidenav, .toolbar, .btn, .navtoggle { display: none !important; }
.main { padding: 0; }
body { background: #fff; color: #000; }
.panel { border: 1px solid #999; background: #fff; page-break-inside: avoid; }
.panel h2, .panel h3 { color: #000; }
th { background: #eee; color: #000; }
.stat { background: #f5f5f5; }
.stat .val { color: #000; }
}
</style>

</head>
<body>
<div id="topbar"></div>
<div class="container">
  <div id="sidenav" class="sidenav"></div>
  <div id="main" class="main"></div>
</div>
<div id="toast-host"></div>

<script>
"use strict";
(function(){

// ============================================================
// PATTERN LIBRARY
// ============================================================
var PATTERNS = [
  { id:'gh_takeover', re:/password\s+(was\s+)?changed|2FA\s+enabled|recovery\s+codes\s+(downloaded|generated)|security\s+key\s+registered/i, sev:'crit', cat:'Account Takeover', label:'GitHub/account takeover indicators'},
  { id:'oauth_revoke', re:/OAuth\s+token\s+revoked|app\s+access\s+revoked|authorized\s+application\s+removed/i, sev:'high', cat:'Account Takeover', label:'OAuth/app access revocation'},
  { id:'unauth_signin', re:/(unauthorized|suspicious|unrecognized)\s+sign[- ]?in|new\s+device\s+signed\s+in/i, sev:'high', cat:'Account Takeover', label:'Unauthorized sign-in event'},
  { id:'bypassPCS', re:/bypassPCSEncryption[^a-z]*(?:=|:)?\s*(?:1|true|YES)/i, sev:'crit', cat:'CKKS/iCloud', label:'bypassPCSEncryption active'},
  { id:'inCircle0', re:/inCircle[^a-z]*(?:=|:)?\s*0/i, sev:'crit', cat:'CKKS/iCloud', label:'Device excluded from iCloud security circle (inCircle:0)'},
  { id:'tlk_shares', re:/heal-tlk-shares|TLK\s+share|tlkShare/i, sev:'high', cat:'CKKS/iCloud', label:'TLK share / heal-tlk-shares activity'},
  { id:'rotating_ckids', re:/CloudKit.*account.*identifier|ckAccountID/i, sev:'med', cat:'CKKS/iCloud', label:'CloudKit account identifier reference'},
  { id:'oqe_drain', re:/OQE.*items|itemsyncing.*paused/i, sev:'high', cat:'CKKS/iCloud', label:'Passwords OQE drain / itemsyncing paused'},
  { id:'userviews_disabled', re:/userViews.*(?:disabled|DISABLED)/i, sev:'high', cat:'CKKS/iCloud', label:'userViews policy disabled'},
  { id:'findmy_mismatch', re:/FindMy.*(?:mismatch|send.*recv)/i, sev:'high', cat:'CKKS/iCloud', label:'FindMy zone send/recv mismatch'},
  { id:'sensitive_visible', re:/SensitivePropertiesVisible[^a-z]*(?:=|:)?\s*(?:true|YES|1)/i, sev:'crit', cat:'CKKS/iCloud', label:'SensitivePropertiesVisible = true'},
  { id:'untrusted_tunnel', re:/untrusted\s+tunnel|tunnel.*untrusted|CoreDevice.*tunnel/i, sev:'high', cat:'CKKS/iCloud', label:'CoreDevice untrusted tunnel service'},
  { id:'mdm_profile', re:/MDM\s+profile|managedConfiguration|com\.apple\.mdm/i, sev:'high', cat:'MDM/Profile', label:'MDM profile reference'},
  { id:'tmobile_mdm', re:/T-?Mobile.*(profile|managed|MDM)|com\.tmobile/i, sev:'high', cat:'MDM/Profile', label:'T-Mobile managed/MDM reference'},
  { id:'azure_cert', re:/Microsoft\s+Azure|azure.*cert|Microsoft\s+IT\s+TLS/i, sev:'high', cat:'MDM/Profile', label:'Microsoft Azure certificate on iOS'},
  { id:'share_ext_block', re:/share\s+extension.*(?:block|disabled|suppress)|com\.apple\.share/i, sev:'med', cat:'MDM/Profile', label:'Share extension suppression'},
  { id:'cellular_cap', re:/cellular.*(?:limit|cap|100\s*MB|transfer\s+limit)/i, sev:'med', cat:'MDM/Profile', label:'Cellular transfer cap'},
  { id:'private_addr_off', re:/Private\s+(MAC\s+)?Address.*OFF|privateAddress.*false|wifi\.privateAddress.*0/i, sev:'high', cat:'Network', label:'Private MAC Address OFF'},
  { id:'real_mac', re:/\b(?:[0-9A-Fa-f]{2}[:-]){5}[0-9A-Fa-f]{2}\b/, sev:'low', cat:'Network', label:'MAC address present'},
  { id:'call_forward', re:/call\s+forward|forwardingNumber|\+1?214[0-9]{7}/i, sev:'high', cat:'Network', label:'Call forwarding indicator'},
  { id:'tmobile_ipv6', re:/2607:fb90:[0-9a-f:]+/i, sev:'med', cat:'Network', label:'T-Mobile IPv6 (2607:fb90:) address'},
  { id:'serial_match', re:/CW4XKX9QYM/i, sev:'high', cat:'Device', label:'Target iPhone serial CW4XKX9QYM'},
  { id:'udid_anon', re:/UDID.*(?:anonymous|no\s+account|unattributed)/i, sev:'high', cat:'Device', label:'Anonymous/unattributed UDID'},
  { id:'diag_enroll', re:/diagnostic.*enroll|enrolled.*diagnostic|MDMRegistered/i, sev:'high', cat:'Device', label:'Apple diagnostic enrollment'},
  { id:'clouddocs_noclient', re:/com\.apple\.CloudDocs.*(?:no\s+client|missing)/i, sev:'high', cat:'Files', label:'com.apple.CloudDocs no declared client'},
  { id:'notes_mislabel', re:/com\.apple\.notes.*Settings|Settings.*com\.apple\.notes/i, sev:'med', cat:'Files', label:'com.apple.notes mislabeled as Settings'},
  { id:'productkit_b389', re:/productkit.*b389|b389.*productkit/i, sev:'med', cat:'Files', label:'productkit b389 anomaly'},
  { id:'auth_failure', re:/UserAuthenticationFailure|authentication\s+failed.*retry/i, sev:'med', cat:'Auth', label:'Authentication failure / retry'},
  { id:'ext_id_mutation', re:/ExternalIdentifierMutated|externalId.*changed/i, sev:'high', cat:'Auth', label:'External identifier mutation'},
  { id:'no_auth_session', re:/no\s+auth\s+session|without\s+(?:auth|authentication)\s+session/i, sev:'high', cat:'Auth', label:'Action without auth session'},
  { id:'webkit_sop', re:/CVE-2026-20643|WebKit.*Same\s*Origin|SOP\s+bypass/i, sev:'crit', cat:'CVE', label:'WebKit SOP bypass (CVE-2026-20643)'},
  { id:'cve_generic', re:/CVE-\d{4}-\d{4,7}/i, sev:'med', cat:'CVE', label:'CVE reference'},
  { id:'ipv4', re:/\b(?:\d{1,3}\.){3}\d{1,3}\b/, sev:'low', cat:'IOC', label:'IPv4 address'},
  { id:'ipv6', re:/\b(?:[0-9a-f]{1,4}:){2,7}[0-9a-f]{1,4}\b/i, sev:'low', cat:'IOC', label:'IPv6 address'},
  { id:'domain', re:/\b[a-z0-9-]+\.(?:com|net|org|io|co|app|dev|cloud)\b/i, sev:'low', cat:'IOC', label:'Domain reference'},
  { id:'hash', re:/\b[a-f0-9]{32,64}\b/i, sev:'low', cat:'IOC', label:'Hash (MD5/SHA)'}
];
var SEV_RANK = { crit:4, high:3, med:2, low:1 };
var SEV_LABEL = { crit:'CRITICAL', high:'HIGH', med:'MEDIUM', low:'LOW' };
var SEV_EXPLAIN = {
  crit: { plain:'Confirmed indicator of unauthorized access, key compromise, or security-circle exclusion. Treat as primary evidence.', simple:'A red-flag finding. The system is showing signs that someone or something is bypassing normal protections.' },
  high: { plain:'Strong anomaly with documented attribution patterns. Requires correlation with timeline and actor records.', simple:'A serious finding. Something unusual happened that maps to known attack or surveillance behavior.' },
  med:  { plain:'Notable anomaly worth tracking. May be benign in isolation but pattern-relevant in aggregate.', simple:'A finding to keep an eye on. Alone it might be nothing — together with others it can mean something.' },
  low:  { plain:'Indicator-of-compromise candidate (IPs, hashes, MAC addresses). Use for cross-file correlation.', simple:'A piece of raw data — an address, a code — useful for connecting the dots between files.' }
};

// ============================================================
// STATE
// ============================================================
function initialDB(){
  return {
    meta: { created: new Date().toISOString(), version:'v7', name:'Truth Finder Database' },
    findings: [], sources: [], timeline: [], actors: [], iocs: [], files: []
  };
}
var state = {
  db: initialDB(),
  view: 'report_dashboard',
  navCollapsed: window.innerWidth < 720,
  busy: false,
  progress: 0,
  currentFile: '',
  findingsQ: '',
  findingsSev: 'all',
  searches: {} // per-table search state
};

// ============================================================
// DOM HELPERS
// ============================================================
function el(tag, attrs, children) {
  var n = document.createElement(tag);
  if (attrs) {
    for (var k in attrs) {
      var v = attrs[k];
      if (k === 'class') n.className = v;
      else if (k === 'style' && typeof v === 'object') { for (var s in v) n.style[s] = v[s]; }
      else if (k.indexOf('on') === 0 && typeof v === 'function') n.addEventListener(k.slice(2).toLowerCase(), v);
      else if (k === 'value') n.value = v;
      else if (k === 'checked') n.checked = !!v;
      else if (k === 'html') n.innerHTML = v;
      else if (v != null) n.setAttribute(k, v);
    }
  }
  if (children != null) {
    if (!Array.isArray(children)) children = [children];
    for (var i=0;i<children.length;i++){
      var c = children[i];
      if (c == null || c === false) continue;
      if (typeof c === 'string' || typeof c === 'number') n.appendChild(document.createTextNode(String(c)));
      else if (Array.isArray(c)) { for (var j=0;j<c.length;j++){ if (c[j]) n.appendChild(c[j]); } }
      else n.appendChild(c);
    }
  }
  return n;
}
function clear(node){ while (node.firstChild) node.removeChild(node.firstChild); }
function uid(p){ p = p || 'id'; return p+'_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,7); }
function nowISO(){ return new Date().toISOString(); }

function toast(msg) {
  var host = document.getElementById('toast-host');
  clear(host);
  host.appendChild(el('div', { class: 'toast' }, msg));
  setTimeout(function(){ clear(host); }, 2400);
}

function downloadBlob(data, filename, type){
  type = type || 'application/json';
  var blob = new Blob([data], { type: type });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
}

// ============================================================
// FILE INGEST (Lockdown-safe: FileReader + slice chunks)
// ============================================================
function ingestFile(file, onProgress, onChunk){
  return new Promise(function(resolve, reject){
    var chunkSize = 256 * 1024;
    var offset = 0;
    var buffer = '';
    var lineNo = 0;
    var total = file.size || 1;

    function readNext(){
      if (offset >= file.size) {
        if (buffer.length) { lineNo++; try { onChunk(buffer, lineNo); } catch(e){} }
        onProgress(100);
        resolve(lineNo);
        return;
      }
      var slice = file.slice(offset, offset + chunkSize);
      var reader = new FileReader();
      reader.onload = function(ev){
        var text = String(ev.target.result || '');
        buffer += text;
        var nl;
        while ((nl = buffer.indexOf('\n')) >= 0) {
          var line = buffer.slice(0, nl);
          buffer = buffer.slice(nl + 1);
          lineNo++;
          try { onChunk(line, lineNo); } catch(e){}
        }
        offset += chunkSize;
        onProgress(Math.min(100, Math.round((offset/total)*100)));
        setTimeout(readNext, 0);
      };
      reader.onerror = function(){ reject(new Error('Read error')); };
      reader.readAsText(slice);
    }
    readNext();
  });
}

function scanLine(line, fileName, fileId){
  var hits = [];
  for (var i=0;i<PATTERNS.length;i++){
    var p = PATTERNS[i];
    var m = line.match(p.re);
    if (m) {
      hits.push({
        patternId: p.id, label: p.label, category: p.cat, severity: p.sev,
        match: String(m[0]).slice(0,200), fileName: fileName, fileId: fileId
      });
    }
  }
  return hits;
}

// ============================================================
// ACTIONS
// ============================================================
function setView(v){
  state.view = v;
  if (window.innerWidth < 720) state.navCollapsed = true;
  render();
}
function toggleNav(){ state.navCollapsed = !state.navCollapsed; render(); }

function handleLoadFile(file){
  if (!file) return;
  state.busy = true; state.progress = 0; state.currentFile = file.name;
  render();
  var fileId = uid('file');
  var collected = [];
  var iocsCollected = [];

  ingestFile(file,
    function(p){ state.progress = p; updateTopbarProgress(); },
    function(line, lineNo){
      var hits = scanLine(line, file.name, fileId);
      for (var i=0;i<hits.length;i++){
        var hit = Object.assign({}, hits[i], { id: uid('find'), lineNo: lineNo, createdAt: nowISO(), source: 'auto' });
        collected.push(hit);
        if (hit.category === 'IOC') {
          iocsCollected.push({ id: uid('ioc'), type: hit.patternId, value: hit.match, context: file.name+':'+lineNo, severity: 'low', createdAt: nowISO() });
        }
      }
    }
  ).then(function(totalLines){
    state.db.files.push({ id: fileId, name: file.name, size: file.size, lines: totalLines, ingestedAt: nowISO(), hits: collected.length });
    state.db.findings = state.db.findings.concat(collected);
    state.db.iocs = state.db.iocs.concat(iocsCollected);
    state.db.sources.push({ id: uid('src'), name: file.name, type:'file', addedAt: nowISO(), fileId: fileId });
    state.busy = false; state.progress = 0;
    state.view = 'findings';
    render();
    toast('Ingested ' + file.name + ' — ' + collected.length + ' hits / ' + totalLines + ' lines');
  }).catch(function(e){
    state.busy = false; state.progress = 0;
    render();
    toast('Ingest error: ' + (e && e.message ? e.message : 'unknown'));
  });
}

function handleSaveDB(){
  var data = JSON.stringify(Object.assign({}, state.db, { exportedAt: nowISO() }), null, 2);
  downloadBlob(data, 'truthfinder_' + new Date().toISOString().slice(0,10) + '.json');
  toast('Database saved');
}

function handleRestore(file){
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(){
    try {
      var parsed = JSON.parse(reader.result);
      if (!parsed || typeof parsed !== 'object') throw new Error('Invalid JSON');
      state.db = {
        meta: parsed.meta || initialDB().meta,
        findings: parsed.findings || [],
        sources: parsed.sources || [],
        timeline: parsed.timeline || [],
        actors: parsed.actors || [],
        iocs: parsed.iocs || [],
        files: parsed.files || []
      };
      render();
      toast('Database restored');
    } catch(e){
      toast('Restore failed: ' + (e && e.message ? e.message : 'invalid file'));
    }
  };
  reader.onerror = function(){ toast('Restore failed: read error'); };
  reader.readAsText(file);
}

function handlePrint(){
  state.view = 'report_dashboard';
  render();
  setTimeout(function(){ window.print(); }, 250);
}

function removeFinding(id){
  state.db.findings = state.db.findings.filter(function(f){ return f.id !== id; });
  render();
}

// ============================================================
// COMPONENTS
// ============================================================
function sevBadge(s){ return el('span', { class: 'sev ' + s }, SEV_LABEL[s] || s); }

function buildTable(columns, rows, emptyMsg) {
  if (!rows.length) return el('div', { class: 'empty' }, emptyMsg || 'No records');
  var head = el('tr', null, columns.map(function(c){ return el('th', null, c.label); }));
  var body = rows.map(function(r, i){
    return el('tr', { key: r.id || i }, columns.map(function(c){
      var content = c.render ? c.render(r) : (r[c.key] != null ? String(r[c.key]) : '');
      return el('td', { class: c.mono ? 'mono' : '' }, content);
    }));
  });

function simpleTableView(title, rows, columns, emptyMsg, key){
  state.searches[key] = state.searches[key] || '';
  var q = state.searches[key].toLowerCase();
  var filtered = q ? rows.filter(function(r){
    var keys = Object.keys(r);

    return false;
  }) : rows;
  var input = el('input', { type:'text', placeholder:'Search…', value: state.searches[key], oninput: function(e){ state.searches[key] = e.target.value; renderMain(); } });
  return el('div', { class:'panel' }, [
    el('h2', null, title + ' (' + filtered.length + ')'),
    el('div', { class:'toolbar' }, input),
    buildTable(columns, filtered, emptyMsg)
  ]);
}

function viewQueryBuilder(){
  state.qb = state.qb || { target:'findings', field:'label', op:'contains', val:'', results:[] };
  var qb = state.qb;
  var tSel = el('select', { onchange: function(e){ qb.target = e.target.value; } },
    ['findings','sources','timeline','actors','iocs','files'].map(function(x){ return el('option',{value:x}, x.charAt(0).toUpperCase()+x.slice(1)); })
  );
  tSel.value = qb.target;
  var opSel = el('select', { onchange: function(e){ qb.op = e.target.value; } }, [
    el('option', { value:'contains' }, 'contains'),
    el('option', { value:'equals' }, 'equals'),
    el('option', { value:'starts' }, 'starts with'),
    el('option', { value:'regex' }, 'regex')
  ]);
  opSel.value = qb.op;
  return el('div', { class:'panel' }, [
    el('h2', null, 'Query Builder'),
    el('div', { class:'formgrid' }, [
      el('div', { class:'formfield' }, [el('label', null, 'Table'), tSel]),
      el('div', { class:'formfield' }, [el('label', null, 'Field'),
        el('input', { type:'text', value: qb.field, oninput: function(e){ qb.field = e.target.value; }, placeholder:'label, category, severity…' })
      ]),
      el('div', { class:'formfield' }, [el('label', null, 'Operator'), opSel]),
      el('div', { class:'formfield' }, [el('label', null, 'Value'),
        el('input', { type:'text', value: qb.val, oninput: function(e){ qb.val = e.target.value; } })
      ])
    ]),
    el('button', { class:'btn primary', onclick: function(){
      var data = state.db[qb.target] || [];
      var s = qb.val.toLowerCase();
      qb.results = data.filter(function(row){
        var rv = String(row[qb.field] != null ? row[qb.field] : '').toLowerCase();
        if (qb.op === 'contains') return rv.indexOf(s) >= 0;
        if (qb.op === 'equals') return rv === s;
        if (qb.op === 'starts') return rv.indexOf(s) === 0;
        if (qb.op === 'regex') { try { return new RegExp(qb.val, 'i').test(String(row[qb.field]||'')); } catch(e){ return false; } }
        return false;
      });
      renderMain();
    } }, 'Run Query'),
    el('div', { class:'divider' }),
    el('div', { class:'helptext' }, qb.results.length + ' result(s)'),
    el('div', { class:'codebox' }, JSON.stringify(qb.results.slice(0,50), null, 2))
  ]);
}

function viewCrossPatterns(){
  var pf = {};
  state.db.findings.forEach(function(f){
    if (!f.patternId) return;
    if (!pf[f.patternId]) pf[f.patternId] = { label: f.label, severity: f.severity, files: {}, count: 0 };
    pf[f.patternId].files[f.fileName || 'unknown'] = true;
    pf[f.patternId].count++;
  });
  var cross = Object.keys(pf).map(function(k){
    var v = pf[k]; var fk = Object.keys(v.files);
    return { id:k, label:v.label, severity:v.severity, count:v.count, fileCount: fk.length, fileList: fk.join(', ') };
  }).filter(function(r){ return r.fileCount > 1; })
    .sort(function(a,b){ return b.fileCount - a.fileCount || (SEV_RANK[b.severity]||0) - (SEV_RANK[a.severity]||0); });
  return el('div', { class:'panel' }, [
    el('h2', null, 'Cross-File Patterns (' + cross.length + ')'),
    el('div', { class:'helptext' }, 'Patterns matched in 2+ source files. Strong correlation candidates.'),
    buildTable([
      { key:'severity', label:'Sev', render: function(r){ return sevBadge(r.severity); } },
      { key:'label', label:'Pattern' },
      { key:'fileCount', label:'Files' },
      { key:'count', label:'Hits' },
      { key:'fileList', label:'Source files', mono:true }
    ], cross, 'No cross-file patterns yet. Load 2+ files to detect.')
  ]);
}

function viewTrends(){
  var buckets = {};
  state.db.findings.forEach(function(f){
    var d = (f.createdAt || '').slice(0,10) || 'undated';
    if (!buckets[d]) buckets[d] = { d:d, crit:0, high:0, med:0, low:0, total:0 };
    if (buckets[d][f.severity] != null) buckets[d][f.severity]++;
    buckets[d].total++;
  });
  var rows = Object.keys(buckets).map(function(k){ return buckets[k]; }).sort(function(a,b){ return a.d.localeCompare(b.d); });
  var max = 1;
  rows.forEach(function(r){ if (r.total > max) max = r.total; });
  var contents = [el('h2', null, 'Time-Series Trends'),
    el('div', { class:'helptext' }, 'Findings by ingestion date. Bar shows total per day.')];
  if (!rows.length) contents.push(el('div', { class:'empty' }, 'No data yet.'));
  else rows.forEach(function(r){
    var bar = el('div', { class:'bar' }, [
      (function(){ var d = el('div', null); d.style.width = (r.crit/max*100)+'%'; d.style.background = 'var(--crit)'; return d; })(),
      (function(){ var d = el('div', null); d.style.width = (r.high/max*100)+'%'; d.style.background = 'var(--high)'; return d; })(),
      (function(){ var d = el('div', null); d.style.width = (r.med/max*100)+'%'; d.style.background = 'var(--med)'; return d; })(),
      (function(){ var d = el('div', null); d.style.width = (r.low/max*100)+'%'; d.style.background = 'var(--low)'; return d; })()
    ]);
    contents.push(el('div', { class:'trendrow' }, [
      el('div', { class:'barlbl' }, [el('span', null, r.d), el('span', null, r.total + ' (' + r.crit + 'C / ' + r.high + 'H / ' + r.med + 'M / ' + r.low + 'L)')]),
      bar
    ]));
  });
  return el('div', { class:'panel' }, contents);
}

function viewCombos(){
  var fileMap = {};
  state.db.findings.forEach(function(f){
    var k = f.fileName || 'unknown';
    if (!fileMap[k]) fileMap[k] = {};
    if (f.patternId) fileMap[k][f.patternId] = true;
  });
  var combos = {};
  Object.keys(fileMap).forEach(function(file){
    var arr = Object.keys(fileMap[file]).sort();
    for (var i=0;i<arr.length;i++) for (var j=i+1;j<arr.length;j++){
      var k = arr[i] + ' + ' + arr[j];
      if (!combos[k]) combos[k] = { combo:k, files:{} };
      combos[k].files[file] = true;
    }
  });
  var rows = Object.keys(combos).map(function(k){
    var c = combos[k]; var fk = Object.keys(c.files);
    return { combo:c.combo, fileCount:fk.length, files:fk.join(', ') };
  }).filter(function(r){ return r.fileCount >= 2; })
    .sort(function(a,b){ return b.fileCount - a.fileCount; })
    .slice(0,50);
  return el('div', { class:'panel' }, [
    el('h2', null, 'Cross-File Combos (' + rows.length + ')'),
    el('div', { class:'helptext' }, 'Pattern pairs that co-occur in 2+ files. Top 50 shown.'),
    buildTable(
      [{key:'combo',label:'Pattern Pair',mono:true},{key:'fileCount',label:'Files'},{key:'files',label:'In files',mono:true}],
      rows, 'No multi-file combos yet.'
    )
  ]);
}

    ]),

  });
  var nav = document.getElementById('sidenav');
  nav.className = 'sidenav' + (state.navCollapsed ? ' collapsed' : '');
  return nodes;
}

// ============================================================
// MAIN VIEW DISPATCH
// ============================================================
function buildMain(){
  switch (state.view) {
    case 'findings': return viewFindings();
    case 'sources': return viewSources();
    case 'timeline': return viewTimeline();
    case 'actors': return viewActors();
    case 'iocs': return viewIOCs();
    case 'files': return viewFiles();
    case 'new_finding': return viewNewFinding();
    case 'new_actor': return viewNewActor();
    case 'new_ioc': return viewNewIOC();
    case 'query_builder': return viewQueryBuilder();
    case 'critical_only': return viewCriticalOnly();
    case 'cross_patterns': return viewCrossPatterns();
    case 'report_dashboard': return viewDashboard();
    case 'report_trends': return viewTrends();
    case 'report_severity': return viewSeverity();
    case 'report_combos': return viewCombos();
    default: return viewDashboard();
  }
}

// ============================================================
// RENDER
// ============================================================
function renderMain(){
  var main = document.getElementById('main');
  clear(main);
  main.appendChild(buildMain());
}
function render(){
  var top = document.getElementById('topbar');
  clear(top);
  top.appendChild(buildTopbar());

  var nav = document.getElementById('sidenav');
  clear(nav);
  buildNav().forEach(function(n){ nav.appendChild(n); });
  nav.className = 'sidenav' + (state.navCollapsed ? ' collapsed' : '');

  renderMain();
}

// Initial render
try {
  render();
} catch (err) {
  document.body.innerHTML = '<div style="padding:20px;color:#a83232;font-family:monospace;">Boot error: ' + (err && err.message ? err.message : err) + '</div>';
}

})();
</script>

</body>
</html>
