<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><meta name="apple-mobile-web-app-capable" content="yes"><title>TF DB</title><style>

*{margin:0;padding:0;box-sizing:border-box}body{background:#000;color:#e0e0e0;font:14px -apple-system,sans-serif}
button{background:#1a1a1a;border:1px solid #333;color:#ddd;padding:6px 10px;border-radius:6px;font-size:11px}
.hd{padding:10px;border-bottom:1px solid #333;display:flex;justify-content:space-between;align-items:center}
.hd h1{font-size:16px;color:#fff}
.tabs{display:flex;border-bottom:1px solid #333;background:#111;overflow-x:auto}
.tabs button{border:none;border-radius:0;border-bottom:2px solid transparent;background:none;color:#888;padding:9px 11px;font-size:11px;flex:none}
.tabs button.on{color:#2563eb;border-bottom-color:#2563eb;font-weight:600}
.pg{padding:10px;display:none;padding-bottom:80px}.pg.on{display:block}
.cd{background:#111;border-radius:8px;padding:10px;margin-bottom:8px;border:1px solid #333}
.sb{display:inline-block;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:700;color:#fff;margin-right:3px}
.sC{background:#ef4444}.sH{background:#f97316}.sM{background:#eab308}.sL{background:#3b82f6}
.sopen{background:#3b82f6}.sinvestigating{background:#a855f7}.sblocked{background:#ef4444}.sattempted{background:#f97316}.sresolved{background:#16a34a}
.st{background:#111;border-radius:8px;padding:8px;text-align:center;flex:1;min-width:45px;border:1px solid #222}
.st b{display:block;font-size:18px;font-weight:700}.st small{font-size:7px;color:#888;text-transform:uppercase}
.fg{margin-bottom:6px}.fg label{display:block;color:#888;font-size:9px;text-transform:uppercase;margin-bottom:2px}
.fg input,.fg select,.fg textarea{width:100%;padding:8px;border-radius:6px;border:1px solid #333;background:#1a1a1a;color:#ddd;font:13px -apple-system,sans-serif;outline:none}
.fg textarea{min-height:44px;resize:vertical}.row{display:flex;gap:6px}.row>*{flex:1}
.ba{background:#2563eb;border:none;color:#fff;font-weight:600;width:100%;padding:10px;border-radius:8px;font-size:13px}
.exc{background:#0a0a0a;padding:4px;border-radius:4px;font:10px monospace;color:#888;margin-top:3px;word-break:break-all;white-space:pre-wrap}
.cbo{background:#1a0000;border-radius:8px;padding:10px;margin-bottom:8px;border:1px solid #ef444433}
.bsm{padding:3px 8px;border-radius:4px;font-size:10px;border:1px solid;background:none}
.chip{display:inline-block;padding:4px 8px;border-radius:4px;font-size:10px;border:1px solid #333;background:#1a1a1a;color:#888;margin:0 3px 4px 0}
.chip.on{background:#2563eb22;border-color:#2563eb;color:#2563eb}
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#16a34a;color:#fff;padding:7px 18px;border-radius:7px;font-size:12px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s}
.toast.v{opacity:1}
</style></head><body>

<div class="hd"><div><h1>Truth Finder</h1><small style="color:#2563eb;font-size:10px">Local DB</small></div>
<div style="display:flex;gap:4px" id="btns"></div></div>
<input type="file" id="fileIn" style="display:none" accept=".txt,.json,.log,.ips,.csv,.plist,.xml">
<input type="file" id="impIn" style="display:none" accept=".json">
<div class="tabs" id="tabs"></div>
<div id="main"></div>
<div class="toast" id="toast"></div>
<script>
alert("JS works");
var DB={files:[],issues:[],log:[]};
var UI={view:"dash",afile:0,showForm:false,editIdx:null,expand:{},filter:"all"};
var SN={C:"CRITICAL",H:"HIGH",M:"MEDIUM",L:"LOW"};
var PAT=[
{id:"bypassPCS",rx:"bypassPCSEncryption",c:"Encryption",s:"C",w:"PCS encryption bypass",y:"iCloud data without passcode",f:"Factory reset+new Apple ID",co:["rotatingCK","healTLK"]},
{id:"rotatingCK",rx:"CloudKit.*?account.*?identifier",c:"Auth",s:"C",w:"Rotating CloudKit ID",y:"Account injection",f:"Revoke iCloud tokens",co:["bypassPCS"]},
{id:"healTLK",rx:"heal-tlk-shares|heal_tlk",c:"Encryption",s:"C",w:"TLK redistribution",y:"Keys to external peers",f:"Remove from circle",co:["bypassPCS"]},
{id:"inCircle0",rx:"inCircle:\\s*0",c:"Auth",s:"C",w:"Excluded from security circle",y:"External peers hold authority",f:"Reset circle",co:["healTLK"]},
{id:"exclave",rx:"Exclave|ExclaveCore|RedactedLogServer",c:"Kernel",s:"C",w:"Exclave activity",y:"Secure enclave triggered",f:"Capture panic log",co:["kp"]},
{id:"kp",rx:"bug_type.*?210|kernel.panic",c:"Kernel",s:"C",w:"Kernel panic",y:"System crash",f:"Extract panic log",co:["exclave"]},
{id:"MDM",rx:"MCInstall|ManagedSettings|FamilyControls|DeviceManagement",c:"MDM",s:"C",w:"MDM active",y:"Enterprise mgmt personal device",f:"Check VPN and Device Mgmt",co:["mwifi","st"]},
{id:"rctl",rx:"remotectl|remote_tunnel|remoteServiceDiscovery",c:"Remote",s:"C",w:"Remote control services",y:"Remote mgmt",f:"Disable Developer Mode",co:["MDM"]},
{id:"pcapd",rx:"pcapd\\.shim|com\\.apple\\.pcapd",c:"Remote",s:"C",w:"Packet capture",y:"Traffic captured",f:"Unpair computers",co:["rctl"]},
{id:"frel",rx:"file_relay\\.shim",c:"Remote",s:"C",w:"File relay",y:"Remote extraction",f:"Factory reset",co:["rctl"]},
{id:"mis",rx:"misagent\\.shim",c:"MDM",s:"C",w:"Remote profile installer",y:"Profiles without user",f:"Check profiles",co:["MDM"]},
{id:"mwifi",rx:"managed.*?wifi|Private.Address.*?OFF",c:"Network",s:"H",w:"Managed WiFi",y:"Survives reset",f:"Document MAC",co:["MDM"]},
{id:"st",rx:"ScreenTime|safari\\.denyPrivateBrowsing|deviceActivity\\.allowedClients",c:"MDM",s:"H",w:"ScreenTime restrictions",y:"Browsing restricted",f:"Check Screen Time",co:["MDM"]},
{id:"wd",rx:"watchdog|WatchdogEvent",c:"System",s:"H",w:"Watchdog kill",y:"App killed",f:"Note app and action",co:["st"]},
{id:"cap",rx:"CaptiveNetworkSupport|CaptivePortal",c:"Network",s:"H",w:"Captive portal",y:"Interception",f:"Check WiFi profiles",co:["mwifi"]},
{id:"swc",rx:"SWCERR\\d+|Bad.JSON.content",c:"Credentials",s:"H",w:"SWC failure",y:"Credential assoc failing",f:"Check domain",co:["cap"]},
{id:"ret",rx:"Retries:\\s*[1-9]\\d*",c:"Credentials",s:"H",w:"SWC retry loop",y:"Repeated failures",f:"ID top domains",co:["swc"]},
{id:"cn",rx:"icloud\\.com\\.cn",c:"Network",s:"H",w:"China domain",y:"China infra non-China device",f:"Document entries",co:[]},
{id:"tmo",rx:"2607:fb90|172\\.56\\.\\d+\\.\\d+",c:"Network",s:"H",w:"T-Mobile IP",y:"Unauthorized session",f:"Cross-ref logs",co:[]},
{id:"cnt",rx:"AddressBook|CNContact",c:"Privacy",s:"M",w:"Contacts anomaly",y:"Unexpected access",f:"Check count",co:[]},
{id:"hm",rx:"hide.*?my.*?email|privaterelay",c:"Auth",s:"M",w:"Hide My Email",y:"Check creator",f:"Check Apple ID",co:[]},
{id:"h4",rx:"HTTP.*?Code.*?404",c:"Network",s:"L",w:"HTTP 404",y:"Not found",f:"Check domain",co:["swc"]},
{id:"to",rx:"Timeout.*?exceeded|context.deadline",c:"Network",s:"L",w:"Timeout",y:"Held to expiry",f:"Different network",co:["swc"]},
{id:"sa",rx:"systemApplication.*?alwaysEnabled",c:"System",s:"L",w:"alwaysEnabled",y:"Cannot disable",f:"Expected",co:[]}
];

function esc(s){if(!s)return “”;var d=document.createElement(“div”);d.textContent=s;return d.innerHTML}
function toast(m){var t=document.getElementById(“toast”);t.textContent=m;t.classList.add(“v”);clearTimeout(t._tid);t._tid=setTimeout(function(){t.classList.remove(“v”)},2000)}
function addLog(a){DB.log.push({ts:new Date().toISOString(),a:a})}
function save(){try{localStorage.setItem(“tfdb3”,JSON.stringify(DB))}catch(e){}}
function load(){try{var j=localStorage.getItem(“tfdb3”);if(j){DB=JSON.parse(j);return true}}catch(e){}return false}

function analyze(text){
var findings=[],ids={};
PAT.forEach(function(p){
var rx=new RegExp(p.rx,“gi”);var ms=text.match(rx);
if(ms&&ms.length>0){ids[p.id]=true;var exs=[];var rx2=new RegExp(p.rx,“gi”);var m;var n=0;
while((m=rx2.exec(text))!==null&&n<2){var a=Math.max(0,m.index-40);var b=Math.min(text.length,m.index+m[0].length+40);exs.push(”…”+text.slice(a,b).replace(/\n/g,” “)+”…”);n++}
findings.push({id:p.id,c:p.c,s:p.s,w:p.w,y:p.y,f:p.f,h:ms.length,ex:exs,co:p.co})}
});
var combos=[];
PAT.forEach(function(p){if(!ids[p.id]||!p.co||!p.co.length)return;var mt=p.co.filter(function(c){return ids[c]});if(mt.length>0)combos.push({r:p.id+” + “+mt.join(”,”)+” = CRITICAL compound”})});
findings.sort(function(a,b){var o={C:0,H:1,M:2,L:3};return(o[a.s]||9)-(o[b.s]||9)});
var who=[];var rx3=/(?:App ID|bundleID|procName):\s*(\S+)/gi;var ar;while((ar=rx3.exec(text))!==null&&who.length<20){if(who.indexOf(ar[1])===-1)who.push(ar[1])}
return {findings:findings,combos:combos,meta:{lines:text.split(”\n”).length,who:who}}
}

document.getElementById(“fileIn”).addEventListener(“change”,function(){
var file=this.files[0];if(!file)return;var reader=new FileReader();
reader.onload=function(e){var a=analyze(e.target.result);DB.files.push({n:file.name,sz:file.size,t:new Date().toISOString(),a:a});UI.afile=DB.files.length-1;addLog(“Load:”+file.name);save();render();toast(“Loaded: “+file.name)};
reader.readAsText(file);this.value=””});

document.getElementById(“impIn”).addEventListener(“change”,function(){
var file=this.files[0];if(!file)return;var reader=new FileReader();
reader.onload=function(e){try{var d=JSON.parse(e.target.result);if(d.files)DB.files=DB.files.concat(d.files);if(d.issues)DB.issues=DB.issues.concat(d.issues);if(d.log)DB.log=DB.log.concat(d.log);save();render();toast(“Loaded “+(d.files?d.files.length:0)+” files, “+(d.issues?d.issues.length:0)+” issues”)}catch(x){toast(“Import failed”)}};
reader.readAsText(file);this.value=””});

function exportDB(){var j=JSON.stringify(DB,null,2);var b=new Blob([j],{type:“application/json”});var u=URL.createObjectURL(b);var a=document.createElement(“a”);a.href=u;a.download=“tf-”+new Date().toISOString().slice(0,10)+”.json”;a.click();URL.revokeObjectURL(u);toast(“Saved to Downloads”)}

document.getElementById(“btns”).innerHTML=’<button id="bFile">+File</button><button id="bIssue">+Issue</button><button id="bSave">Save</button><button id="bLoad">Load</button>’;
document.getElementById(“bFile”).addEventListener(“click”,function(){document.getElementById(“fileIn”).click()});
document.getElementById(“bIssue”).addEventListener(“click”,function(){UI.editIdx=null;UI.showForm=true;UI.view=“iss”;render()});
document.getElementById(“bSave”).addEventListener(“click”,function(){exportDB()});
document.getElementById(“bLoad”).addEventListener(“click”,function(){document.getElementById(“impIn”).click()});

function saveIssue(){
var g=function(id){return document.getElementById(id).value};var t=g(“ft”);if(!t.trim())return;
var o={t:t,w:g(“fw”),y:g(“fy”),s:g(“fs”),st:g(“fst”),c:g(“fc”),at:g(“fa”),bl:g(“fb”),sl:g(“fsl”),no:g(“fn”),cr:UI.editIdx!==null?DB.issues[UI.editIdx].cr:new Date().toISOString(),up:new Date().toISOString()};
if(UI.editIdx!==null){DB.issues[UI.editIdx]=o;addLog(“Edit:”+t)}else{DB.issues.unshift(o);addLog(“New:”+t)}
UI.showForm=false;UI.editIdx=null;save();render();toast(“Saved”)}

function render(){
var h=””;var aF=[];var aC=[];
DB.files.forEach(function(f,fi){(f.a&&f.a.findings||[]).forEach(function(fd,fdi){aF.push({fd:fd,fi:fi,fdi:fdi,fn:f.n})});(f.a&&f.a.combos||[]).forEach(function(c){aC.push({c:c,fn:f.n})})});
var nC=aF.filter(function(x){return x.fd.s===“C”}).length;var nH=aF.filter(function(x){return x.fd.s===“H”}).length;
var nO=DB.issues.filter(function(x){return x.st===“open”}).length;var nB=DB.issues.filter(function(x){return x.st===“blocked”}).length;
var nA=DB.issues.filter(function(x){return x.st===“attempted”}).length;var nR=DB.issues.filter(function(x){return x.st===“resolved”}).length;

var tabs=[[“dash”,“Dashboard”],[“find”,“Findings”],[“iss”,“Issues(”+DB.issues.length+”)”],[“fil”,“Files(”+DB.files.length+”)”],[“cmb”,“Combos”],[“lg”,“Log(”+DB.log.length+”)”]];
var th=””;tabs.forEach(function(t){th+=’<button class=”’+(UI.view===t[0]?“on”:””)+’” data-v=”’+t[0]+’”>’+t[1]+’</button>’});
document.getElementById(“tabs”).innerHTML=th;
document.querySelectorAll(”.tabs button”).forEach(function(b){b.addEventListener(“click”,function(){UI.view=this.getAttribute(“data-v”);render()})});

if(UI.view===“dash”){
h+=’<div class="pg on"><div class="row" style="gap:4px;margin-bottom:8px">’;
[[nC,“CRIT”,”#ef4444”],[nH,“HIGH”,”#f97316”],[nO,“OPEN”,”#3b82f6”],[nB,“BLKD”,”#ef4444”],[nA,“TRIED”,”#f97316”],[nR,“DONE”,”#16a34a”]].forEach(function(s){h+=’<div class="st"><b style="color:'+s[2]+'">’+s[0]+’</b><small>’+s[1]+’</small></div>’});
h+=’</div>’;
if(nB>0){h+=’<div class="cd" style="border-color:#ef444444"><div style="font-size:11px;font-weight:700;color:#ef4444;margin-bottom:4px">BLOCKED</div>’;DB.issues.forEach(function(i,x){if(i.st===“blocked”)h+=’<div style="font-size:11px;padding:2px 0" data-edit="'+x+'">’+esc(i.t)+’</div>’});h+=’</div>’}
if(aC.length>0){h+=’<div class="cbo"><div style="font-size:11px;font-weight:700;color:#ef4444;margin-bottom:4px">COMPOUNDS: ‘+aC.length+’</div>’;aC.slice(0,5).forEach(function(c){h+=’<div style="font-size:10px;color:#fca5a5">’+esc(c.c.r)+’</div>’});h+=’</div>’}
if(DB.files.length>0){h+=’<div class="cd"><div style="font-size:11px;color:#888;margin-bottom:3px">FILES: ‘+DB.files.length+’</div>’;DB.files.forEach(function(f){h+=’<div style="font-size:10px;color:#aaa">’+esc(f.n)+” - “+(f.a?f.a.findings.length:0)+” findings</div>”});h+=’</div>’}
if(!DB.files.length&&!DB.issues.length)h+=’<div style="text-align:center;padding:30px"><p style="color:#888;margin-bottom:12px">Load a file or create an issue</p><button class="ba" id="bLoad2">+Load File</button></div>’;
h+=’</div>’}

if(UI.view===“find”){
h+=’<div class="pg on">’;
if(!aF.length)h+=’<p style="color:#888;text-align:center;padding:20px">Load a file first</p>’;
aF.forEach(function(x,i){var k=x.fi+”-”+x.fd.id;var exp=UI.expand[k];
h+=’<div class="cd"><div style="display:flex;gap:5px" data-exp="'+k+'">’;
h+=’<span class="sb s'+x.fd.s+'">’+SN[x.fd.s]+’</span><div style="flex:1"><div style="font-size:12px;font-weight:600;color:#fff">’+esc(x.fd.w)+’</div>’;
h+=’<div style="font-size:9px;color:#888">’+esc(x.fd.c)+’ | ‘+x.fd.h+‘x | ‘+esc(x.fn)+’</div></div>’;
h+=’<span style="color:#555">’+(exp?“▲”:“▼”)+’</span></div>’;
if(exp){h+=’<div style="margin-top:6px">’;
h+=’<div style="margin-bottom:3px"><span style="font-size:9px;color:#ef4444;font-weight:700">WHY:</span> <span style="font-size:11px">’+esc(x.fd.y)+’</span></div>’;
h+=’<div style="margin-bottom:3px"><span style="font-size:9px;color:#16a34a;font-weight:700">FIX:</span> <span style="font-size:11px">’+esc(x.fd.f)+’</span></div>’;
if(x.fd.co&&x.fd.co.length)h+=’<div style="margin-bottom:3px"><span style="font-size:9px;color:#eab308;font-weight:700">ELEVATES:</span> <span style="font-size:11px;color:#eab308">’+x.fd.co.join(”, “)+’</span></div>’;
(x.fd.ex||[]).forEach(function(e){h+=’<div class="exc">’+esc(e)+’</div>’});
h+=’<button class=“bsm” style=“border-color:#2563eb;color:#2563eb;margin-top:6px” data-promote=”’+x.fi+”-”+x.fdi+’”>+Issue</button></div>’}
h+=’</div>’});
h+=’</div>’}

if(UI.view===“iss”){
h+=’<div class="pg on">’;
if(UI.showForm){var ei=UI.editIdx!==null?DB.issues[UI.editIdx]:null;
h+=’<div class="cd"><div style="font-size:12px;font-weight:600;color:#fff;margin-bottom:8px">’+(ei?“Edit”:“New”)+’ Issue</div>’;
h+=’<div class="fg"><label>Title</label><input id=“ft” value=”’+(ei?esc(ei.t):””)+’”></div>’;
h+=’<div class="row"><div class="fg"><label>Severity</label><select id="fs">’;[“C”,“H”,“M”,“L”].forEach(function(v){h+=’<option value=”’+v+’”’+(ei&&ei.s===v?” selected”:””)+’>’+SN[v]+’</option>’});
h+=’</select></div><div class="fg"><label>Status</label><select id="fst">’;[“open”,“investigating”,“blocked”,“attempted”,“resolved”].forEach(function(v){h+=’<option value=”’+v+’”’+(ei&&ei.st===v?” selected”:””)+’>’+v+’</option>’});
h+=’</select></div></div>’;
h+=’<div class="fg"><label>Category</label><select id="fc">’;[“General”,“Encryption”,“Auth”,“Kernel”,“MDM”,“Remote”,“Network”,“Hardware”,“System”,“Credentials”,“Privacy”,“Email”,“Account”,“Legal”].forEach(function(v){h+=’<option value=”’+v+’”’+(ei&&ei.c===v?” selected”:””)+’>’+v+’</option>’});h+=’</select></div>’;
h+=’<div class="fg"><label>What</label><textarea id="fw">’+(ei?esc(ei.w):””)+’</textarea></div>’;
h+=’<div class="fg"><label>Why</label><textarea id="fy">’+(ei?esc(ei.y):””)+’</textarea></div>’;
h+=’<div class="fg"><label>What I tried</label><textarea id="fa">’+(ei?esc(ei.at):””)+’</textarea></div>’;
h+=’<div class="fg"><label>Blocked by</label><textarea id="fb">’+(ei?esc(ei.bl):””)+’</textarea></div>’;
h+=’<div class="fg"><label>Solution</label><textarea id="fsl">’+(ei?esc(ei.sl):””)+’</textarea></div>’;
h+=’<div class="fg"><label>Notes</label><textarea id="fn">’+(ei?esc(ei.no):””)+’</textarea></div>’;
h+=’<div class="row" style="margin-top:6px"><button class="ba" id="bSaveIssue">Save</button><button id="bCancel">Cancel</button></div></div>’;
}else{
h+=’<div style="display:flex;flex-wrap:wrap;margin-bottom:6px">’;[“all”,“open”,“investigating”,“blocked”,“attempted”,“resolved”].forEach(function(f){var cnt=f===“all”?DB.issues.length:DB.issues.filter(function(i){return i.st===f}).length;h+=’<span class=“chip’+(UI.filter===f?” on”:””)+’” data-filter=”’+f+’”>’+f+’(’+cnt+’)</span>’});h+=’</div>’;
var fi=DB.issues.filter(function(i){return UI.filter===“all”||i.st===UI.filter});
if(!fi.length)h+=’<p style="color:#555;text-align:center;padding:20px">No issues yet</p>’;
fi.forEach(function(i){var x=DB.issues.indexOf(i);
h+=’<div class=“cd” style=“border-color:’+(i.st===“blocked”?”#ef444444”:i.st===“resolved”?”#16a34a44”:”#333”)+’”>’;
h+=’<div style="margin-bottom:3px"><span class="sb s'+i.s+'">’+SN[i.s]+’</span><span class="sb s'+i.st+'">’+i.st+’</span><span style="font-size:9px;color:#555"> ‘+esc(i.c||””)+’</span></div>’;
h+=’<div style="font-size:12px;font-weight:600;color:#fff">’+esc(i.t)+’</div>’;
if(i.w)h+=’<div style="font-size:10px;color:#aaa;margin-top:2px">’+esc(i.w.slice(0,100))+’</div>’;
if(i.at)h+=’<div style="font-size:10px;color:#f97316;margin-top:2px">Tried: ‘+esc(i.at.slice(0,80))+’</div>’;
if(i.bl)h+=’<div style="font-size:10px;color:#ef4444;margin-top:2px">Blocked: ‘+esc(i.bl.slice(0,80))+’</div>’;
if(i.sl)h+=’<div style="font-size:10px;color:#16a34a;margin-top:2px">Fix: ‘+esc(i.sl.slice(0,80))+’</div>’;
h+=’<div style="display:flex;gap:4px;margin-top:6px">’;
h+=’<button class="bsm" style="border-color:#2563eb;color:#2563eb" data-edit="'+x+'">Edit</button>’;
h+=’<button class="bsm" style="border-color:#ef4444;color:#ef4444" data-del="'+x+'">Del</button>’;
if(i.st!==“resolved”)h+=’<button class="bsm" style="border-color:#16a34a;color:#16a34a" data-status="'+x+'-resolved">Resolve</button>’;
if(i.st===“open”)h+=’<button class="bsm" style="border-color:#a855f7;color:#a855f7" data-status="'+x+'-investigating">Investigate</button>’;
h+=’</div></div>’});
}h+=’</div>’}

if(UI.view===“fil”){
h+=’<div class="pg on">’;
if(!DB.files.length)h+=’<div style="text-align:center;padding:30px"><button class="ba" id="bLoad3">+Load File</button></div>’;
else{h+=’<div style="display:flex;flex-wrap:wrap;margin-bottom:8px">’;DB.files.forEach(function(f,i){h+=’<span class=“chip’+(UI.afile===i?” on”:””)+’” data-afile=”’+i+’”>’+esc(f.n)+’</span>’});h+=’</div>’;
var af=DB.files[UI.afile];if(af){h+=’<div class="cd"><div style="font-size:12px;font-weight:600;color:#fff">’+esc(af.n)+’</div><div style="font-size:10px;color:#888;margin-top:2px">’+Math.round(af.sz/1024)+‘KB | ‘+(af.a?af.a.meta.lines:0)+’ lines | ‘+(af.a?af.a.findings.length:0)+’ findings</div></div>’;
if(af.a)(af.a.findings||[]).forEach(function(f){h+=’<div style="padding:4px 0;border-bottom:1px solid #1a1a1a;font-size:11px"><span class="sb s'+f.s+'">’+SN[f.s]+’</span>’+esc(f.w)+’ <span style="color:#555">’+f.h+‘x</span></div>’})}}
h+=’</div>’}

if(UI.view===“cmb”){
h+=’<div class="pg on">’;
if(!aC.length)h+=’<div class="cd"><p style="color:#555;text-align:center">No compounds yet</p></div>’;
aC.forEach(function(c){h+=’<div class="cbo"><div style="font-size:11px;font-weight:600;color:#ef4444">ELEVATED: CRITICAL</div><div style="font-size:10px;color:#fca5a5;margin-top:2px">’+esc(c.c.r)+’</div><div style="font-size:9px;color:#666;margin-top:2px">’+esc(c.fn)+’</div></div>’});
h+=’</div>’}

if(UI.view===“lg”){
h+=’<div class="pg on">’;
if(!DB.log.length)h+=’<p style="color:#555;text-align:center;padding:20px">No activity</p>’;
DB.log.slice().reverse().forEach(function(l){h+=’<div style="padding:3px 0;font-size:10px;border-bottom:1px solid #111"><span style="color:#555">’+l.ts.slice(0,19).replace(“T”,” “)+’</span> ‘+esc(l.a)+’</div>’});
h+=’</div>’}

document.getElementById(“main”).innerHTML=h;

// Event delegation
document.getElementById(“main”).addEventListener(“click”,function(e){
var t=e.target;while(t&&t!==this){
if(t.getAttribute(“data-exp”)){var k=t.getAttribute(“data-exp”);UI.expand[k]=!UI.expand[k];render();return}
if(t.getAttribute(“data-promote”)){var p=t.getAttribute(“data-promote”).split(”-”);var fi=parseInt(p[0]);var fdi=parseInt(p[1]);var f=DB.files[fi].a.findings[fdi];UI.editIdx=null;UI.showForm=true;UI.view=“iss”;render();document.getElementById(“ft”).value=f.w;document.getElementById(“fw”).value=f.w;document.getElementById(“fy”).value=f.y;document.getElementById(“fs”).value=f.s;document.getElementById(“fst”).value=“investigating”;document.getElementById(“fc”).value=f.c;document.getElementById(“fsl”).value=f.f;document.getElementById(“fn”).value=“Auto:”+f.h+“x in “+DB.files[fi].n;return}
if(t.getAttribute(“data-edit”)){var idx=parseInt(t.getAttribute(“data-edit”));UI.editIdx=idx;UI.showForm=true;UI.view=“iss”;render();return}
if(t.getAttribute(“data-del”)){var idx2=parseInt(t.getAttribute(“data-del”));if(confirm(“Delete?”)){addLog(“Del:”+DB.issues[idx2].t);DB.issues.splice(idx2,1);save();render()}return}
if(t.getAttribute(“data-status”)){var parts=t.getAttribute(“data-status”).split(”-”);var idx3=parseInt(parts[0]);var st=parts[1];DB.issues[idx3].st=st;DB.issues[idx3].up=new Date().toISOString();addLog(st+”:”+DB.issues[idx3].t);save();render();return}
if(t.getAttribute(“data-filter”)){UI.filter=t.getAttribute(“data-filter”);render();return}
if(t.getAttribute(“data-afile”)){UI.afile=parseInt(t.getAttribute(“data-afile”));render();return}
if(t.id===“bSaveIssue”){saveIssue();return}
if(t.id===“bCancel”){UI.showForm=false;UI.editIdx=null;render();return}
if(t.id===“bLoad2”||t.id===“bLoad3”){document.getElementById(“fileIn”).click();return}
t=t.parentNode}
})
}
load();render();
</script></body></html>
