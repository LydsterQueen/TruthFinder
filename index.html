<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Truth Finder v7 — Gold Edition</title>
<style>
  :root {
    --bg: #0a0a0a;
    --panel: #111111;
    --panel2: #161616;
    --border: #2a2418;
    --accent: #c9a961;
    --accent2: #8a7234;
    --text: #e8e3d5;
    --dim: #8a8270;
    --crit: #a83232;
    --high: #b8702a;
    --med: #a88830;
    --low: #3a6b8a;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }
  #root { min-height: 100vh; }

.topbar {
position: sticky; top: 0; z-index: 100;
background: linear-gradient(180deg, #0e0c08 0%, #0a0907 100%);
border-bottom: 1px solid var(–border);
padding: 8px 10px;
}
.ribbon { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.logo {
font-weight: 700; letter-spacing: 0.5px; font-size: 14px;
color: var(–accent); margin-right: auto;
display: flex; align-items: center; gap: 6px;
}
.logo small { color: var(–dim); font-weight: 400; font-size: 10px; letter-spacing: 1px;}
.btn {
background: #1a1610; color: var(–text);
border: 1px solid var(–border);
padding: 7px 11px; border-radius: 6px;
font-size: 12px; font-weight: 500;
cursor: pointer; white-space: nowrap;
-webkit-appearance: none;
}
.btn:active { background: #221c12; }
.btn.primary { background: var(–accent2); color: #0a0a0a; border-color: var(–accent); font-weight: 600;}
.btn.ghost { background: transparent; }
.btn.danger { color: var(–crit); border-color: #4a1818; }
.btn:disabled { opacity: 0.4; }

.filebar {
margin-top: 8px;
display: flex; gap: 6px; align-items: center;
padding: 6px 8px;
background: var(–panel2);
border: 1px solid var(–border);
border-radius: 6px;
}
.filebar input[type=file] { display: none; }
.filebar .fname { font-size: 11px; color: var(–dim); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;}

.container { display: flex; min-height: calc(100vh - 110px); }
.sidenav {
width: 180px; flex-shrink: 0;
background: var(–panel);
border-right: 1px solid var(–border);
padding: 8px 6px;
}
.sidenav.collapsed { display: none; }
.navgroup { font-size: 10px; color: var(–dim); text-transform: uppercase; padding: 8px 8px 4px; letter-spacing: 1px; }
.navitem {
display: block; padding: 8px 10px;
font-size: 13px; color: var(–text);
cursor: pointer; border-radius: 5px;
border: 1px solid transparent;
}
.navitem.active { background: #1a1510; color: var(–accent); border-color: var(–border); }
.navitem:active { background: #221b10; }

.main { flex: 1; padding: 12px; min-width: 0; }
.navtoggle { display: none; }

@media (max-width: 720px) {
.sidenav { position: fixed; top: 110px; left: 0; bottom: 0; z-index: 90; width: 220px; }
.sidenav.collapsed { display: none; }
.navtoggle { display: inline-flex; }
.main { padding: 10px; }
}

.panel {
background: var(–panel);
border: 1px solid var(–border);
border-radius: 8px;
padding: 12px; margin-bottom: 12px;
}
.panel h2 { margin: 0 0 10px; font-size: 15px; color: var(–accent); font-weight: 600; letter-spacing: 0.3px;}
.panel h3 { margin: 12px 0 8px; font-size: 13px; color: var(–accent); font-weight: 600;}
.row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 8px; }
.stat {
background: var(–panel2);
border: 1px solid var(–border);
border-radius: 6px;
padding: 8px 10px;
flex: 1; min-width: 120px;
}
.stat .lbl { font-size: 10px; color: var(–dim); text-transform: uppercase; letter-spacing: 1px;}
.stat .val { font-size: 18px; color: var(–accent); font-weight: 600; margin-top: 2px;}

.tablewrap { overflow-x: auto; -webkit-overflow-scrolling: touch; border: 1px solid var(–border); border-radius: 6px;}
table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 500px;}
th, td { padding: 7px 9px; text-align: left; border-bottom: 1px solid var(–border); vertical-align: top;}
th { background: var(–panel2); color: var(–accent); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; position: sticky; top: 0;}
tr:last-child td { border-bottom: none; }
td.mono { font-family: ui-monospace, “SF Mono”, Menlo, monospace; font-size: 11px; color: var(–dim); }

.sev { display: inline-block; padding: 2px 7px; border-radius: 3px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;}
.sev.crit { background: var(–crit); color: #fff; }
.sev.high { background: var(–high); color: #fff; }
.sev.med { background: var(–med); color: #0a0a0a; }
.sev.low { background: var(–low); color: #fff; }

label { display: block; font-size: 11px; color: var(–dim); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.5px;}
input[type=text], input[type=number], input[type=date], textarea, select {
width: 100%;
background: var(–panel2);
color: var(–text);
border: 1px solid var(–border);
border-radius: 5px;
padding: 8px 10px;
font-size: 14px;
font-family: inherit;
-webkit-appearance: none;
}
textarea { min-height: 70px; resize: vertical; }
.formgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
@media (max-width: 600px) { .formgrid { grid-template-columns: 1fr; } }
.formfield { margin-bottom: 8px; }
.formfield.full { grid-column: 1 / -1; }

.toolbar { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
.toolbar input[type=text] { flex: 1; min-width: 150px; }

.progress { height: 4px; background: #1a1610; border-radius: 2px; overflow: hidden; margin-top: 6px;}
.progress > div { height: 100%; background: var(–accent); transition: width 0.2s;}

.toast {
position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
background: #1a1610; color: var(–accent);
border: 1px solid var(–accent2);
padding: 10px 16px; border-radius: 6px;
z-index: 200; font-size: 13px;
box-shadow: 0 4px 16px rgba(0,0,0,0.5);
max-width: 90%;
}

@media print {
.topbar, .sidenav, .toolbar, .btn { display: none !important; }
.main { padding: 0; }
body { background: #fff; color: #000; }
.panel { border: 1px solid #999; background: #fff; page-break-inside: avoid; }
.panel h2, .panel h3 { color: #000; }
th { background: #eee; color: #000; }
.stat { background: #f5f5f5; }
.stat .val { color: #000; }
.sev.crit { background: #a83232; }
.sev.high { background: #b8702a; }
.sev.med { background: #a88830; color: #000; }
.sev.low { background: #3a6b8a; }
}

.empty { color: var(–dim); text-align: center; padding: 24px; font-style: italic;}
.pill { display: inline-block; padding: 1px 6px; border-radius: 3px; background: var(–panel2); border: 1px solid var(–border); font-size: 10px; color: var(–dim); margin-right: 4px;}
.helptext { font-size: 11px; color: var(–dim); margin-top: 4px; }
.divider { height: 1px; background: var(–border); margin: 12px 0; }
details { margin: 6px 0; }
summary { cursor: pointer; color: var(–accent); font-size: 12px; padding: 4px 0; }
.codebox {
background: #0a0807; border: 1px solid var(–border); border-radius: 4px;
padding: 6px 8px; font-family: ui-monospace, monospace; font-size: 10px;
color: var(–dim); white-space: pre-wrap; word-break: break-all;
max-height: 240px; overflow: auto;
}
.lockdown-notice {
background: #1a1610; border: 1px solid var(–accent2);
padding: 10px 12px; border-radius: 6px;
font-size: 12px; color: var(–accent);
margin-bottom: 12px;
display: none;
}
</style>

</head>
<body>
<div id="root">
  <div style="padding:24px;color:#c9a961;font-family:-apple-system,system-ui,sans-serif;">
    <div style="font-size:18px;font-weight:600;margin-bottom:8px;">◆ Truth Finder v7</div>
    <div style="color:#8a8270;font-size:13px;">Loading…</div>
    <div id="boot-error" style="margin-top:16px;color:#a83232;font-size:12px;font-family:ui-monospace,monospace;"></div>
  </div>
</div>

<script>
  // Boot error visibility for Lockdown / loading failures
  window.addEventListener('error', function(e) {
    var n = document.getElementById('boot-error');
    if (n) n.textContent = 'Boot error: ' + (e.message || e);
  });
</script>

<!-- React UMD only — no Babel, no JSX runtime. Lockdown-safe. -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<script>
(function(){
  'use strict';

  if (!window.React || !window.ReactDOM) {
    document.getElementById('boot-error').textContent =
      'React failed to load. If Lockdown Mode is on, tap "Reduce Protections" or use a non-Lockdown profile.';
    return;
  }

  var React = window.React;
  var ReactDOM = window.ReactDOM;
  var useState = React.useState;
  var useEffect = React.useEffect;
  var useMemo = React.useMemo;
  var useRef = React.useRef;
  var useCallback = React.useCallback;
  var h = React.createElement;

  // ============================================================
  // PATTERN LIBRARY
  // ============================================================
  var PATTERNS = [
    { id:'gh_takeover', re:/password\s+(was\s+)?changed|2FA\s+enabled|recovery\s+codes\s+(downloaded|generated)|security\s+key\s+registered/i, sev:'crit', cat:'Account Takeover', label:'GitHub/account takeover indicators'},
    { id:'oauth_revoke', re:/OAuth\s+token\s+revoked|app\s+access\s+revoked|authorized\s+application\s+removed/i, sev:'high', cat:'Account Takeover', label:'OAuth/app access revocation'},
    { id:'unauth_signin', re:/(unauthorized|suspicious|unrecognized)\s+sign[- ]?in|new\s+device\s+signed\s+in/i, sev:'high', cat:'Account Takeover', label:'Unauthorized sign-in event'},
    { id:'bypassPCS', re:/bypassPCSEncryption[^a-z]*(?:=|:)?\s*(?:1|true|YES)/i, sev:'crit', cat:'CKKS/iCloud', label:'bypassPCSEncryption active'},
    { id:'inCircle0', re:/inCircle[^a-z]*(?:=|:)?\s*0/i, sev:'crit', cat:'CKKS/iCloud', label:'Device excluded from iCloud security circle (inCircle:0)'},
    { id:'tlk_shares', re:/heal-tlk-shares|TLK\s+share|tlkShare/i, sev:'high', cat:'CKKS/iCloud', label:'TLK share / heal-tlk-shares activity'},
    { id:'rotating_ckids', re:/CloudKit.*account.*identifier|ckAccountID/i, sev:'med', cat:'CKKS/iCloud', label:'CloudKit account identifier reference'},
    { id:'oqe_drain', re:/OQE.*items|itemsyncing.*paused/i, sev:'high', cat:'CKKS/iCloud', label:'Passwords OQE drain / itemsyncing paused'},
    { id:'userviews_disabled', re:/userViews.*(?:disabled|DISABLED)/i, sev:'high', cat:'CKKS/iCloud', label:'userViews policy disabled'},
    { id:'findmy_mismatch', re:/FindMy.*(?:mismatch|send.*recv)/i, sev:'high', cat:'CKKS/iCloud', label:'FindMy zone send/recv mismatch'},
    { id:'sensitive_visible', re:/SensitivePropertiesVisible[^a-z]*(?:=|:)?\s*(?:true|YES|1)/i, sev:'crit', cat:'CKKS/iCloud', label:'SensitivePropertiesVisible = true'},
    { id:'untrusted_tunnel', re:/untrusted\s+tunnel|tunnel.*untrusted|CoreDevice.*tunnel/i, sev:'high', cat:'CKKS/iCloud', label:'CoreDevice untrusted tunnel service'},
    { id:'mdm_profile', re:/MDM\s+profile|managedConfiguration|com\.apple\.mdm/i, sev:'high', cat:'MDM/Profile', label:'MDM profile reference'},
    { id:'tmobile_mdm', re:/T-?Mobile.*(profile|managed|MDM)|com\.tmobile/i, sev:'high', cat:'MDM/Profile', label:'T-Mobile managed/MDM reference'},
    { id:'azure_cert', re:/Microsoft\s+Azure|azure.*cert|Microsoft\s+IT\s+TLS/i, sev:'high', cat:'MDM/Profile', label:'Microsoft Azure certificate on iOS'},
    { id:'share_ext_block', re:/share\s+extension.*(?:block|disabled|suppress)|com\.apple\.share/i, sev:'med', cat:'MDM/Profile', label:'Share extension suppression'},
    { id:'cellular_cap', re:/cellular.*(?:limit|cap|100\s*MB|transfer\s+limit)/i, sev:'med', cat:'MDM/Profile', label:'Cellular transfer cap'},
    { id:'private_addr_off', re:/Private\s+(MAC\s+)?Address.*OFF|privateAddress.*false|wifi\.privateAddress.*0/i, sev:'high', cat:'Network', label:'Private MAC Address OFF'},
    { id:'real_mac', re:/\b(?:[0-9A-Fa-f]{2}[:-]){5}[0-9A-Fa-f]{2}\b/, sev:'low', cat:'Network', label:'MAC address present'},
    { id:'call_forward', re:/call\s+forward|forwardingNumber|\+1?214[0-9]{7}/i, sev:'high', cat:'Network', label:'Call forwarding indicator'},
    { id:'tmobile_ipv6', re:/2607:fb90:[0-9a-f:]+/i, sev:'med', cat:'Network', label:'T-Mobile IPv6 (2607:fb90:) address'},
    { id:'serial_match', re:/CW4XKX9QYM/i, sev:'high', cat:'Device', label:'Target iPhone serial CW4XKX9QYM'},
    { id:'udid_anon', re:/UDID.*(?:anonymous|no\s+account|unattributed)/i, sev:'high', cat:'Device', label:'Anonymous/unattributed UDID'},
    { id:'diag_enroll', re:/diagnostic.*enroll|enrolled.*diagnostic|MDMRegistered/i, sev:'high', cat:'Device', label:'Apple diagnostic enrollment'},
    { id:'clouddocs_noclient', re:/com\.apple\.CloudDocs.*(?:no\s+client|missing)/i, sev:'high', cat:'Files', label:'com.apple.CloudDocs no declared client'},
    { id:'notes_mislabel', re:/com\.apple\.notes.*Settings|Settings.*com\.apple\.notes/i, sev:'med', cat:'Files', label:'com.apple.notes mislabeled as Settings'},
    { id:'productkit_b389', re:/productkit.*b389|b389.*productkit/i, sev:'med', cat:'Files', label:'productkit b389 anomaly'},
    { id:'auth_failure', re:/UserAuthenticationFailure|authentication\s+failed.*retry/i, sev:'med', cat:'Auth', label:'Authentication failure / retry'},
    { id:'ext_id_mutation', re:/ExternalIdentifierMutated|externalId.*changed/i, sev:'high', cat:'Auth', label:'External identifier mutation'},
    { id:'no_auth_session', re:/no\s+auth\s+session|without\s+(?:auth|authentication)\s+session/i, sev:'high', cat:'Auth', label:'Action without auth session'},
    { id:'webkit_sop', re:/CVE-2026-20643|WebKit.*Same\s*Origin|SOP\s+bypass/i, sev:'crit', cat:'CVE', label:'WebKit SOP bypass (CVE-2026-20643)'},
    { id:'cve_generic', re:/CVE-\d{4}-\d{4,7}/i, sev:'med', cat:'CVE', label:'CVE reference'},
    { id:'ipv4', re:/\b(?:\d{1,3}\.){3}\d{1,3}\b/, sev:'low', cat:'IOC', label:'IPv4 address'},
    { id:'ipv6', re:/\b(?:[0-9a-f]{1,4}:){2,7}[0-9a-f]{1,4}\b/i, sev:'low', cat:'IOC', label:'IPv6 address'},
    { id:'domain', re:/\b[a-z0-9-]+\.(?:com|net|org|io|co|app|dev|cloud|apple\.com)\b/i, sev:'low', cat:'IOC', label:'Domain reference'},
    { id:'hash', re:/\b[a-f0-9]{32,64}\b/i, sev:'low', cat:'IOC', label:'Hash (MD5/SHA)'}
  ];

  var SEV_RANK = { crit:4, high:3, med:2, low:1 };
  var SEV_LABEL = { crit:'CRITICAL', high:'HIGH', med:'MEDIUM', low:'LOW' };
  var SEV_EXPLAIN = {
    crit: { plain:'Confirmed indicator of unauthorized access, key compromise, or security-circle exclusion. Treat as primary evidence.', simple:'A red-flag finding. The system is showing signs that someone or something is bypassing normal protections.' },
    high: { plain:'Strong anomaly with documented attribution patterns. Requires correlation with timeline and actor records.', simple:'A serious finding. Something unusual happened that maps to known attack or surveillance behavior.' },
    med:  { plain:'Notable anomaly worth tracking. May be benign in isolation but pattern-relevant in aggregate.', simple:'A finding to keep an eye on. Alone it might be nothing — together with others it can mean something.' },
    low:  { plain:'Indicator-of-compromise candidate (IPs, hashes, MAC addresses). Use for cross-file correlation.', simple:'A piece of raw data — an address, a code — useful for connecting the dots between files.' }
  };

  // ============================================================
  // HELPERS
  // ============================================================
  function uid(p){ p = p || 'id'; return p+'_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,7); }
  function nowISO(){ return new Date().toISOString(); }

  function initialDB(){
    return {
      meta: { created: nowISO(), version: 'v7', name: 'Truth Finder Database' },
      findings: [], sources: [], timeline: [], actors: [], iocs: [], files: []
    };
  }

  function downloadBlob(data, filename, type){
    type = type || 'application/json';
    var blob = new Blob([data], { type: type });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
  }

  // Streaming ingest using FileReader (Lockdown-safe; avoids file.stream())
  function ingestFile(file, onProgress, onChunk){
    return new Promise(function(resolve, reject){
      var reader = new FileReader();
      var chunkSize = 256 * 1024; // 256KB chunks
      var offset = 0;
      var buffer = '';
      var lineNo = 0;
      var total = file.size || 1;
      var decoder = (typeof TextDecoder !== 'undefined') ? new TextDecoder('utf-8', { fatal: false }) : null;

      function readNext(){
        if (offset >= file.size) {
          if (buffer.length) { lineNo++; onChunk(buffer, lineNo); }
          onProgress(100);
          resolve(lineNo);
          return;
        }
        var slice = file.slice(offset, offset + chunkSize);
        reader.onload = function(e){
          var text;
          if (decoder && e.target.result instanceof ArrayBuffer) {
            text = decoder.decode(e.target.result, { stream: true });
          } else {
            text = String(e.target.result || '');
          }
          buffer += text;
          var nl;
          while ((nl = buffer.indexOf('\n')) >= 0) {
            var line = buffer.slice(0, nl);
            buffer = buffer.slice(nl + 1);
            lineNo++;
            try { onChunk(line, lineNo); } catch(err) {}
          }
          offset += chunkSize;
          onProgress(Math.min(100, Math.round((offset/total)*100)));
          setTimeout(readNext, 0);
        };
        reader.onerror = function(){ reject(new Error('Read error')); };
        if (decoder) {
          reader.readAsArrayBuffer(slice);
        } else {
          reader.readAsText(slice);
        }
      }
      readNext();
    });
  }

  function scanLine(line, fileName, fileId){
    var hits = [];
    for (var i=0;i<PATTERNS.length;i++){
      var p = PATTERNS[i];
      var m = line.match(p.re);
      if (m) {
        hits.push({
          patternId: p.id, label: p.label, category: p.cat, severity: p.sev,
          match: String(m[0]).slice(0,200), fileName: fileName, fileId: fileId
        });
      }
    }
    return hits;
  }

  // ============================================================
  // SMALL COMPONENTS
  // ============================================================

  function SeverityBadge(props){
    return h('span', { className: 'sev ' + props.s }, SEV_LABEL[props.s] || props.s);
  }

  function Table(props){
    var columns = props.columns, rows = props.rows, empty = props.empty || 'No records';
    if (!rows.length) return h('div', { className: 'empty' }, empty);
    return h('div', { className: 'tablewrap' },
      h('table', null,
        h('thead', null, h('tr', null, columns.map(function(c){ return h('th', { key: c.key }, c.label); }))),
        h('tbody', null, rows.map(function(r, i){
          return h('tr', { key: r.id || i }, columns.map(function(c){
            var content = c.render ? c.render(r) : (r[c.key] != null ? r[c.key] : '');
            return h('td', { key: c.key, className: c.mono ? 'mono' : '' }, content);
          }));
        }))
      )
    );
  }

  // ============================================================
  // VIEW: Findings
  // ============================================================
  function FindingsView(props){
    var db = props.db, setDB = props.setDB;
    var qs = useState(''), q = qs[0], setQ = qs[1];
    var ss = useState('all'), sev = ss[0], setSev = ss[1];
    var filtered = useMemo(function(){
      return db.findings.filter(function(f){
        if (sev !== 'all' && f.severity !== sev) return false;
        if (q) {
          var s = q.toLowerCase();
          if ((f.label||'').toLowerCase().indexOf(s) < 0 &&
              (f.category||'').toLowerCase().indexOf(s) < 0 &&
              (f.match||'').toLowerCase().indexOf(s) < 0 &&
              (f.fileName||'').toLowerCase().indexOf(s) < 0) return false;
        }
        return true;
      }).sort(function(a,b){ return (SEV_RANK[b.severity]||0) - (SEV_RANK[a.severity]||0); });
    }, [db.findings, q, sev]);

    function remove(id){ setDB(function(d){ return Object.assign({}, d, { findings: d.findings.filter(function(f){ return f.id !== id; }) }); }); }

    return h('div', { className: 'panel' },
      h('h2', null, 'Findings (' + filtered.length + ' / ' + db.findings.length + ')'),
      h('div', { className: 'toolbar' },
        h('input', { type: 'text', placeholder: 'Search findings…', value: q, onChange: function(e){ setQ(e.target.value); } }),
        h('select', { value: sev, onChange: function(e){ setSev(e.target.value); } },
          h('option', { value: 'all' }, 'All severities'),
          h('option', { value: 'crit' }, 'Critical'),
          h('option', { value: 'high' }, 'High'),
          h('option', { value: 'med' }, 'Medium'),
          h('option', { value: 'low' }, 'Low')
        )
      ),
      h(Table, {
        columns: [
          { key: 'severity', label: 'Sev', render: function(r){ return h(SeverityBadge, { s: r.severity }); } },
          { key: 'label', label: 'Finding' },
          { key: 'category', label: 'Category' },
          { key: 'fileName', label: 'Source', mono: true },
          { key: 'lineNo', label: 'Line', render: function(r){ return r.lineNo || '—'; } },
          { key: 'match', label: 'Match', mono: true, render: function(r){ return (r.match||'').slice(0,80); } },
          { key: 'actions', label: '', render: function(r){ return h('button', { className: 'btn danger', onClick: function(){ remove(r.id); } }, '×'); } }
        ],
        rows: filtered,
        empty: 'No findings yet. Load a file or add one manually.'
      })
    );
  }

  // ============================================================
  // VIEW: Generic searchable table
  // ============================================================
  function SimpleTableView(props){
    var qs = useState(''), q = qs[0], setQ = qs[1];

  function QueryBuilder(props){
    var db = props.db;
    var f = useState('label'); var field = f[0], setField = f[1];
    var op = useState('contains'); var oper = op[0], setOper = op[1];
    var v = useState(''); var val = v[0], setVal = v[1];
    var t = useState('findings'); var target = t[0], setTarget = t[1];
    var r = useState([]); var results = r[0], setResults = r[1];
    function run(){
      var data = db[target] || [];
      var s = val.toLowerCase();
      var out = data.filter(function(row){
        var rv = String(row[field] != null ? row[field] : '').toLowerCase();
        if (oper === 'contains') return rv.indexOf(s) >= 0;
        if (oper === 'equals') return rv === s;
        if (oper === 'starts') return rv.indexOf(s) === 0;
        if (oper === 'regex') { try { return new RegExp(val, 'i').test(String(row[field]||'')); } catch(e){ return false; } }
        return false;
      });
      setResults(out);
    }
    return h('div', { className: 'panel' },
      h('h2', null, 'Query Builder'),
      h('div', { className: 'formgrid' },
        h('div', { className: 'formfield' },
          h('label', null, 'Table'),
          h('select', { value: target, onChange: function(e){ setTarget(e.target.value); } },
            ['findings','sources','timeline','actors','iocs','files'].map(function(x){ return h('option', { key: x, value: x }, x.charAt(0).toUpperCase()+x.slice(1)); })
          )
        ),
        h('div', { className: 'formfield' }, h('label', null, 'Field'), h('input', { type: 'text', value: field, onChange: function(e){ setField(e.target.value); }, placeholder: 'label, category, severity…' })),
        h('div', { className: 'formfield' },
          h('label', null, 'Operator'),
          h('select', { value: oper, onChange: function(e){ setOper(e.target.value); } },
            h('option', { value: 'contains' }, 'contains'),
            h('option', { value: 'equals' }, 'equals'),
            h('option', { value: 'starts' }, 'starts with'),
            h('option', { value: 'regex' }, 'regex')
          )
        ),
        h('div', { className: 'formfield' }, h('label', null, 'Value'), h('input', { type: 'text', value: val, onChange: function(e){ setVal(e.target.value); } }))
      ),
      h('button', { className: 'btn primary', onClick: run }, 'Run Query'),
      h('div', { className: 'divider' }),
      h('div', { className: 'helptext' }, results.length + ' result(s)'),
      h('div', { className: 'codebox' }, JSON.stringify(results.slice(0,50), null, 2))
    );
  }

  function CrossPatterns(props){
    var patternFiles = {};
    props.db.findings.forEach(function(f){
      if (!f.patternId) return;
      if (!patternFiles[f.patternId]) patternFiles[f.patternId] = { label: f.label, severity: f.severity, files: {}, count: 0 };
      patternFiles[f.patternId].files[f.fileName || 'unknown'] = true;
      patternFiles[f.patternId].count++;
    });
    var cross = Object.keys(patternFiles).map(function(k){
      var v = patternFiles[k];
      var fk = Object.keys(v.files);
      return { id: k, label: v.label, severity: v.severity, count: v.count, fileCount: fk.length, fileList: fk.join(', ') };
    }).filter(function(r){ return r.fileCount > 1; })
      .sort(function(a,b){ return b.fileCount - a.fileCount || (SEV_RANK[b.severity]||0) - (SEV_RANK[a.severity]||0); });
    return h('div', { className: 'panel' },
      h('h2', null, 'Cross-File Patterns (' + cross.length + ')'),
      h('div', { className: 'helptext' }, 'Patterns matched in 2+ source files. Strong correlation candidates.'),

  function ReportTrends(props){

      buckets[d][f.severity] = (buckets[d][f.severity]||0) + 1;
      buckets[d].total++;
    });
    var rows = Object.keys(buckets).map(function(k){ return buckets[k]; }).sort(function(a,b){ return a.d.localeCompare(b.d); });
    var max = Math.max.apply(null, [1].concat(rows.map(function(r){ return r.total; })));

  function ReportCombos(props){
    var fileMap = {};
    props.db.findings.forEach(function(f){
      var k = f.fileName || 'unknown';
      if (!fileMap[k]) fileMap[k] = {};
      if (f.patternId) fileMap[k][f.patternId] = true;
    });
    var combos = {};
    Object.keys(fileMap).forEach(function(file){
      var arr = Object.keys(fileMap[file]).sort();
      for (var i=0;i<arr.length;i++) for (var j=i+1;j<arr.length;j++){
        var k = arr[i] + ' + ' + arr[j];
        if (!combos[k]) combos[k] = { combo: k, files: {} };
        combos[k].files[file] = true;
      }
    });
    var rows = Object.keys(combos).map(function(k){
      var c = combos[k];
      var fk = Object.keys(c.files);
      return { combo: c.combo, fileCount: fk.length, files: fk.join(', ') };
    }).filter(function(r){ return r.fileCount >= 2; })
      .sort(function(a,b){ return b.fileCount - a.fileCount; })
      .slice(0,50);
    return h('div', { className: 'panel' },
      h('h2', null, 'Cross-File Combos (' + rows.length + ')'),
      h('div', { className: 'helptext' }, 'Pattern pairs that co-occur in 2+ files. Top 50 shown.'),

  // ============================================================
  // APP
  // ============================================================
  function App(){
    var dbs = useState(initialDB()); var db = dbs[0], setDB = dbs[1];
    var vs = useState('report_dashboard'); var view = vs[0], setView = vs[1];
    var ns = useState(window.innerWidth < 720); var navCollapsed = ns[0], setNavCollapsed = ns[1];
    var bs = useState(false); var busy = bs[0], setBusy = bs[1];
    var ps = useState(0); var progress = ps[0], setProgress = ps[1];
    var fs = useState(''); var currentFile = fs[0], setCurrentFile = fs[1];
    var ts = useState(''); var toastMsg = ts[0], setToastMsg = ts[1];

    var toast = useCallback(function(msg){
      setToastMsg(msg);
      setTimeout(function(){ setToastMsg(''); }, 2400);
    }, []);

    var onLoad = useCallback(function(file){
      setBusy(true); setProgress(0); setCurrentFile(file.name);
      var fileId = uid('file');
      var collected = [];
      var iocsCollected = [];
      ingestFile(file,
        function(p){ setProgress(p); },
        function(line, lineNo){
          var hits = scanLine(line, file.name, fileId);
          for (var i=0;i<hits.length;i++){
            var hit = Object.assign({}, hits[i], { id: uid('find'), lineNo: lineNo, createdAt: nowISO(), source: 'auto' });
            collected.push(hit);
            if (hit.category === 'IOC') {
              iocsCollected.push({ id: uid('ioc'), type: hit.patternId, value: hit.match, context: file.name+':'+lineNo, severity: 'low', createdAt: nowISO() });
            }
          }
        }
      ).then(function(totalLines){
        setDB(function(d){
          return Object.assign({}, d, {
            files:    d.files.concat([{ id: fileId, name: file.name, size: file.size, lines: totalLines, ingestedAt: nowISO(), hits: collected.length }]),
            findings: d.findings.concat(collected),
            iocs:     d.iocs.concat(iocsCollected),
            sources:  d.sources.concat([{ id: uid('src'), name: file.name, type: 'file', addedAt: nowISO(), fileId: fileId }])
          });
        });
        toast('Ingested ' + file.name + ' — ' + collected.length + ' hits across ' + totalLines + ' lines');
        setView('findings');
      }).catch(function(e){
        toast('Ingest error: ' + (e && e.message ? e.message : 'unknown'));
      }).then(function(){
        setBusy(false); setProgress(0);
      });
    }, [toast]);

    var onSave = useCallback(function(){
      var data = JSON.stringify(Object.assign({}, db, { exportedAt: nowISO() }), null, 2);
      downloadBlob(data, 'truthfinder_' + new Date().toISOString().slice(0,10) + '.json');
      toast('Database saved');
    }, [db, toast]);

    var onRestore = useCallback(function(file){
      var reader = new FileReader();
      reader.onload = function(){
        try {
          var parsed = JSON.parse(reader.result);
          if (!parsed || typeof parsed !== 'object') throw new Error('Invalid JSON');
          setDB({
            meta: parsed.meta || initialDB().meta,
            findings: parsed.findings || [],
            sources: parsed.sources || [],
            timeline: parsed.timeline || [],
            actors: parsed.actors || [],
            iocs: parsed.iocs || [],
            files: parsed.files || []
          });
          toast('Database restored');
        } catch(e){
          toast('Restore failed: ' + (e && e.message ? e.message : 'invalid file'));
        }
      };
      reader.onerror = function(){ toast('Restore failed: read error'); };
      reader.readAsText(file);
    }, [toast]);

    var onPrint = useCallback(function(){
      setView('report_dashboard');
      setTimeout(function(){ window.print(); }, 250);
    }, []);

    function renderView(){
      switch (view) {
        case 'findings': return h(FindingsView, { db: db, setDB: setDB });
        case 'sources': return h(SimpleTableView, {
          title: 'Sources', rows: db.sources,
          columns: [{key:'name',label:'Name'},{key:'type',label:'Type'},{key:'addedAt',label:'Added',mono:true}],
          empty: 'No sources.'
        });
        case 'timeline': return h(SimpleTableView, {
          title: 'Timeline', rows: db.timeline,
          columns: [{key:'when',label:'When'},{key:'event',label:'Event'},{key:'notes',label:'Notes'}],
          empty: 'No timeline events. Restore a JSON or extend via future form.'
        });
        case 'actors': return h(SimpleTableView, {
          title: 'Actors', rows: db.actors,
          columns: [{key:'name',label:'Name'},{key:'role',label:'Role'},{key:'firstSeen',label:'First Seen'},{key:'notes',label:'Notes'}],
          empty: 'No actors yet.'
        });
        case 'iocs': return h(SimpleTableView, {
          title: 'IOCs', rows: db.iocs,
          columns: [
            {key:'type',label:'Type'},
            {key:'value',label:'Value',mono:true},
            {key:'severity',label:'Sev',render:function(r){ return h(SeverityBadge,{s:r.severity}); }},
            {key:'context',label:'Context',mono:true}
          ],
          empty: 'No IOCs yet.'
        });
        case 'files': return h(SimpleTableView, {
          title: 'Files', rows: db.files,
          columns: [
            {key:'name',label:'Name'},{key:'size',label:'Bytes'},{key:'lines',label:'Lines'},
            {key:'hits',label:'Hits'},{key:'ingestedAt',label:'Ingested',mono:true}
          ],
          empty: 'No files ingested.'
        });
        case 'new_finding': return h(NewFindingForm, { db: db, setDB: setDB, toast: toast });
        case 'new_actor':   return h(NewActorForm,   { db: db, setDB: setDB, toast: toast });
        case 'new_ioc':     return h(NewIOCForm,     { db: db, setDB: setDB, toast: toast });
        case 'query_builder':  return h(QueryBuilder,  { db: db });
        case 'critical_only':  return h(CriticalOnly,  { db: db });
        case 'cross_patterns': return h(CrossPatterns, { db: db });
        case 'report_dashboard': return h(ReportDashboard, { db: db });
        case 'report_trends':    return h(ReportTrends,    { db: db });
        case 'report_severity':  return h(ReportSeverity,  { db: db });
        case 'report_combos':    return h(ReportCombos,    { db: db });
        default: return h(ReportDashboard, { db: db });
      }
    }

    return h('div', null,
      h(Topbar, {
        onLoad: onLoad, onSave: onSave, onRestore: onRestore, onPrint: onPrint,
        onToggleNav: function(){ setNavCollapsed(function(c){ return !c; }); },
        fileName: currentFile, busy: busy, progress: progress
      }),
      h('div', { className: 'container' },
        h(Nav, {
          view: view,
          setView: function(v){ setView(v); if (window.innerWidth < 720) setNavCollapsed(true); },
          collapsed: navCollapsed
        }),
        h('div', { className: 'main' }, renderView())
      ),
      toastMsg ? h('div', { className: 'toast' }, toastMsg) : null
    );
  }

  try {
    var root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(h(App));
  } catch (err) {
    document.getElementById('boot-error').textContent = 'Render error: ' + (err && err.message ? err.message : err);
  }
})();
</script>

</body>
</html>
