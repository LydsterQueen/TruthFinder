const IP_RE = /\b(?:\d{1,3}\.){3}\d{1,3}\b/g;
const EMAIL_RE = /\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}\b/g;
const SEV_ORDER = { MAYDAY: -1, CRITICAL: 0, HIGH: 1, MEDIUM: 2, LOW: 3 };
const SEV_COLORS = {
  MAYDAY: { bg: "#5a0f0f", fg: "#fecaca", border: "#dc2626" },
  CRITICAL: { bg: "#451a1a", fg: "#fca5a5", border: "#7f1d1d" },
  HIGH: { bg: "#451f0a", fg: "#fdba74", border: "#9a3412" },
  MEDIUM: { bg: "#3f2e0a", fg: "#fde047", border: "#854d0e" },
  LOW: { bg: "#0f2540", fg: "#93c5fd", border: "#1e40af" }
};

      const u = new Set(m.map(x => x.file));
      return m.length >= 2 && u.size >= 2;
    },

    },

    reason: "Two or more CKKS anomalies together describe a keychain actively readable by parties other than device owner, with automatic re-provisioning on every boot." },
  { id: "swc-wallet-interception",
    description: "Wallet credential interception compound",
    trigger: (f) => {
      const ids = new Set(f.map(x => x.patternId));
      return ids.has("walletDomain") && (ids.has("swcFail") || ids.has("invalidChar")) && (ids.has("retryLoop") || ids.has("http404"));
    },
    applyTo: ["swcFail","invalidChar","retryLoop","http404","walletDomain"],

    reason: "wallet.apple.com SWC validation failing with HTML-substituted-for-JSON AND retry loops = active interception of Apple Pay credential validation." },
  { id: "ioc-direct-match",

    applyTo: ["ghostIP135","ghostIP172","ghostIP144","orgUUID1","orgUUID2","relayEmail","killerz","dallasNum"],

function applyElevation(findings) {
  const elevated = findings.map(f => ({ ...f, originalSev: f.sev, elevatedBy: [] }));
  for (const rule of ELEVATION_RULES) {
    if (rule.trigger(elevated)) {
      for (const finding of elevated) {
        if (rule.applyTo.includes(finding.patternId)) {
          if (SEV_ORDER[rule.elevateTo] < SEV_ORDER[finding.sev]) {
            finding.sev = rule.elevateTo;
          }
          finding.elevatedBy.push({ rule: rule.id, description: rule.description, reason: rule.reason, elevatedTo: rule.elevateTo });
        }
      }
    }
  }
  return elevated;
}

function getActiveElevationRules(findings) {
  return ELEVATION_RULES.filter(r => r.trigger(findings));
}

function TruthFinderV5() {
  const [files, setFiles] = useState([]);
  const [findings, setFindings] = useState([]);
  const [ips, setIps] = useState({});
  const [emails, setEmails] = useState({});
  const [tab, setTab] = useState("dashboard");
  const [expanded, setExpanded] = useState({});
  const [search, setSearch] = useState("");
  const [sevFilter, setSevFilter] = useState("");
  const [busy, setBusy] = useState(false);
  const [progress, setProgress] = useState(null);
  const inputRef = useRef(null);
  const loadRef = useRef(null);

  const ingestFile = useCallback(async (file) => {
    setBusy(true);
    setProgress({ name: file.name, pct: 0, msg: "Opening " + file.name });

    const fileRec = { id: Date.now() + "-" + Math.random().toString(36).slice(2,7), name: file.name, size: file.size, added: new Date().toISOString(), lineCount: 0, findingCount: 0 };
    const reader = file.stream().getReader();
    const decoder = new TextDecoder("utf-8", { fatal: false });
    let buf = "";
    let bytes = 0;
    let lineNum = 0;
    const fileFindings = new Map();
    const fileIPs = new Set();
    const fileEmails = new Set();

    try {
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        bytes += value.byteLength;
        buf += decoder.decode(value, { stream: true });
        let nl;
        while ((nl = buf.indexOf("\n")) !== -1) {
          const line = buf.slice(0, nl);
          buf = buf.slice(nl + 1);
          lineNum++;
          scanLine(line, lineNum, file.name, fileFindings, fileIPs, fileEmails);
        }
        const pct = file.size > 0 ? (bytes / file.size) * 100 : 0;
        setProgress({ name: file.name, pct, msg: "Streaming... " + (bytes/1048576).toFixed(1) + "MB" });
        await new Promise(r => setTimeout(r, 0));
      }
      if (buf.length) { lineNum++; scanLine(buf, lineNum, file.name, fileFindings, fileIPs, fileEmails); }

      const arr = Array.from(fileFindings.values());
      fileRec.lineCount = lineNum;
      fileRec.findingCount = arr.length;
      setFiles(p => [...p, fileRec]);
      setFindings(p => [...p, ...arr]);
      setIps(p => {
        const next = { ...p };
        for (const ip of fileIPs) {
          if (!next[ip]) next[ip] = { count: 0, files: new Set() };
          next[ip] = { count: next[ip].count + 1, files: new Set([...next[ip].files, file.name]) };
        }
        return next;
      });
      setEmails(p => {
        const next = { ...p };
        for (const em of fileEmails) {
          if (!next[em]) next[em] = { count: 0, files: new Set() };
          next[em] = { count: next[em].count + 1, files: new Set([...next[em].files, file.name]) };
        }
        return next;
      });
      setProgress({ name: file.name, pct: 100, msg: "Done: " + lineNum.toLocaleString() + " lines, " + arr.length + " findings" });
      setTimeout(() => setProgress(null), 2000);
    } catch (err) {
      setProgress({ name: file.name, pct: 0, msg: "Error: " + err.message });
    } finally {
      setBusy(false);
    }
  }, []);

  function scanLine(line, lineNum, fileName, fileFindings, fileIPs, fileEmails) {
    if (!line || line.length < 3) return;
    for (const pat of PATTERNS) {
      if (pat.rx.test(line)) {
        const key = fileName + "::" + pat.id;
        if (fileFindings.has(key)) {
          const f = fileFindings.get(key);
          f.count++;
          if (f.examples.length < 3) f.examples.push({ line: lineNum, text: line.slice(0,220) });
        } else {
          fileFindings.set(key, {
            id: key + "-" + Date.now(),
            patternId: pat.id, file: fileName, label: pat.label, cat: pat.cat, sev: pat.sev,
            fact: pat.fact, mechanism: pat.mechanism, whyCritical: pat.whyCritical,
            fitsScenarioWith: pat.fitsScenarioWith, fix: pat.fix,
            count: 1, examples: [{ line: lineNum, text: line.slice(0,220) }]
          });
        }
      }
    }
    const ipMatches = line.match(IP_RE);
    if (ipMatches) for (const ip of ipMatches) {
      const parts = ip.split(".").map(Number);
      if (parts.every(p => p >= 0 && p <= 255) && ip !== "0.0.0.0") fileIPs.add(ip);
    }
    const emailMatches = line.match(EMAIL_RE);
    if (emailMatches) for (const em of emailMatches) fileEmails.add(em.toLowerCase());
  }

  const handleFiles = async (fl) => { for (const f of fl) await ingestFile(f); };
  const clearAll = () => {
    if (!confirm("Clear all findings and files?")) return;
    setFiles([]); setFindings([]); setIps({}); setEmails({}); setExpanded({});
  };
  const saveSnapshot = () => {
    const snap = { version: 5, savedAt: new Date().toISOString(), files, findings,
      ips: Object.fromEntries(Object.entries(ips).map(([k,v]) => [k, { count: v.count, files: Array.from(v.files) }])),
      emails: Object.fromEntries(Object.entries(emails).map(([k,v]) => [k, { count: v.count, files: Array.from(v.files) }])) };
    const blob = new Blob([JSON.stringify(snap, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "truthfinder-v5-" + new Date().toISOString().replace(/[:.]/g,"-").slice(0,19) + ".json";
    a.click();
    URL.revokeObjectURL(url);
  };
  const restoreSnapshot = async (file) => {
    try {
      const snap = JSON.parse(await file.text());
      setFiles(snap.files || []);
      setFindings(snap.findings || []);
      setIps(Object.fromEntries(Object.entries(snap.ips || {}).map(([k,v]) => [k, { count: v.count, files: new Set(v.files) }])));
      setEmails(Object.fromEntries(Object.entries(snap.emails || {}).map(([k,v]) => [k, { count: v.count, files: new Set(v.files) }])));
    } catch (err) { alert("Restore failed: " + err.message); }
  };

  const elevatedFindings = applyElevation(findings);
  const activeRules = getActiveElevationRules(elevatedFindings);
  const sevCounts = elevatedFindings.reduce((a,f) => { a[f.sev] = (a[f.sev]||0)+1; return a; }, {});

  const getScenarioMatches = (finding) => {
    if (!finding.fitsScenarioWith || finding.fitsScenarioWith.length === 0) return [];
    return elevatedFindings.filter(f => finding.fitsScenarioWith.includes(f.patternId) && f.id !== finding.id);
  };

  const filteredFindings = elevatedFindings
    .filter(f => !sevFilter || f.sev === sevFilter)
    .filter(f => {
      if (!search) return true;
      const s = search.toLowerCase();
      return f.label.toLowerCase().includes(s) || f.file.toLowerCase().includes(s) || f.cat.toLowerCase().includes(s) || f.fact.toLowerCase().includes(s);
    })
    .sort((a,b) => SEV_ORDER[a.sev] - SEV_ORDER[b.sev] || b.count - a.count);

  const S = {
    page: { minHeight: "100vh", background: "#0a0a0a", color: "#e5e5e5", fontSize: 14, paddingBottom: 40 },
    header: { padding: "12px 16px", borderBottom: "1px solid #222", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8, position: "sticky", top: 0, background: "#0a0a0a", zIndex: 10 },
    title: { fontSize: 16, fontWeight: 600 },
    sub: { color: "#4a9eff", fontSize: 10, letterSpacing: 1, textTransform: "uppercase" },
    btns: { display: "flex", gap: 6, flexWrap: "wrap" },
    btn: { background: "#1a1a1a", color: "#e5e5e5", border: "1px solid #2a2a2a", padding: "6px 12px", borderRadius: 4, fontSize: 12, cursor: "pointer" },
    btnDanger: { background: "#1a1a1a", color: "#fca5a5", border: "1px solid #7f1d1d", padding: "6px 12px", borderRadius: 4, fontSize: 12, cursor: "pointer" },
    tabs: { display: "flex", borderBottom: "1px solid #222", overflowX: "auto" },
    tab: (active) => ({ background: "transparent", color: active ? "#4a9eff" : "#aaa", border: "none", borderBottom: active ? "2px solid #4a9eff" : "2px solid transparent", padding: "10px 16px", fontSize: 13, cursor: "pointer", whiteSpace: "nowrap" }),
    body: { padding: 16 },
    kpis: { display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(90px,1fr))", gap: 8, marginBottom: 16 },
    kpi: { background: "#111", border: "1px solid #222", borderRadius: 6, padding: "12px 8px", textAlign: "center" },
    kpiN: (c) => ({ fontSize: 22, fontWeight: 700, color: c }),
    kpiL: { fontSize: 10, color: "#888", textTransform: "uppercase", letterSpacing: 0.5, marginTop: 2 },
    card: (sev) => ({ background: "#111", border: "1px solid " + (SEV_COLORS[sev]?.border || "#222"), borderLeft: "3px solid " + (SEV_COLORS[sev]?.fg || "#888"), borderRadius: 6, padding: 12, marginBottom: 8 }),
    cardHead: { display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8, cursor: "pointer" },
    cardTitle: { fontWeight: 600, fontSize: 13 },
    pill: (sev) => ({ display: "inline-block", padding: "2px 7px", borderRadius: 3, fontSize: 10, fontWeight: 700, letterSpacing: 0.5, background: SEV_COLORS[sev]?.bg, color: SEV_COLORS[sev]?.fg, whiteSpace: "nowrap" }),
    meta: { color: "#888", fontSize: 11, marginTop: 4 },
    section: { marginTop: 10 },
    sectionLabel: { fontSize: 10, color: "#888", letterSpacing: 0.5, textTransform: "uppercase", fontWeight: 600, marginBottom: 4 },
    sectionText: { fontSize: 12.5, color: "#d5d5d5", lineHeight: 1.55 },
    input: { background: "#111", border: "1px solid #222", color: "#e5e5e5", padding: "7px 10px", borderRadius: 4, fontSize: 12 },
    dropZone: { border: "2px dashed #2a2a2a", borderRadius: 10, padding: 30, textAlign: "center", marginBottom: 16, background: "#0c0c0c" },
    progress: { background: "#111", border: "1px solid #222", borderRadius: 6, padding: 10, marginBottom: 16 },
    progressBar: { height: 4, background: "#222", borderRadius: 2, overflow: "hidden", marginTop: 6 },
    progressFill: (pct) => ({ height: "100%", background: "#4a9eff", width: pct + "%", transition: "width .2s" }),
    empty: { textAlign: "center", color: "#666", padding: 40, background: "#0d0d0d", border: "1px dashed #222", borderRadius: 6 }
  };

  return (
    <div style={S.page}>
      <div style={S.header}>
        <div>
          <div style={S.title}>Truth Finder</div>
          <div style={S.sub}>Forensic Analyzer v5 · Interpretation Layer</div>
        </div>
        <div style={S.btns}>
          <button style={S.btn} onClick={() => inputRef.current?.click()} disabled={busy}>+ File</button>
          <button style={S.btn} onClick={saveSnapshot}>Save</button>
          <button style={S.btn} onClick={() => loadRef.current?.click()}>Load</button>
          <button style={S.btnDanger} onClick={clearAll}>Clear</button>
        </div>
      </div>

      <div style={S.tabs}>
        {["dashboard","findings","files","iocs"].map(t => (
          <button key={t} style={S.tab(tab===t)} onClick={() => setTab(t)}>
            {t === "dashboard" ? "Dashboard" : t === "findings" ? "Findings (" + findings.length + ")" : t === "files" ? "Files (" + files.length + ")" : "IOCs (" + (Object.keys(ips).length + Object.keys(emails).length) + ")"}
          </button>
        ))}
      </div>

      <div style={S.body}>
        {progress && (
          <div style={S.progress}>
            <div style={{display:"flex", justifyContent:"space-between", fontSize:12}}>
              <span>{progress.name}</span>
              <span>{progress.pct.toFixed(1)}%</span>
            </div>
            <div style={S.progressBar}><div style={S.progressFill(progress.pct)} /></div>
            <div style={{fontSize:11, color:"#888", marginTop:6}}>{progress.msg}</div>
          </div>
        )}

        {tab === "dashboard" && (
          <div>
            {sevCounts.MAYDAY > 0 && (
              <div style={{...S.card("MAYDAY"), marginBottom:16}}>
                <div style={{fontWeight:700, color:"#fecaca", fontSize:14}}>⚠ MAYDAY · COMPOUND THREAT DETECTED</div>
                <div style={{fontSize:12, color:"#fca5a5", marginTop:4}}>{sevCounts.MAYDAY} finding(s) elevated to MAYDAY by compound evidence</div>
                <div style={{marginTop:10, fontSize:12, color:"#e5e5e5", lineHeight:1.5}}>
                  Individual findings auto-elevated because they appear together in patterns that describe active, persistent unauthorized state — not isolated anomalies.
                </div>
                {activeRules.filter(r => r.elevateTo === "MAYDAY").map(r => (
                  <div key={r.id} style={{marginTop:10, padding:8, background:"#0a0a0a", borderRadius:4, fontSize:11.5, color:"#d5d5d5"}}>
                    <strong style={{color:"#fecaca"}}>{r.description}:</strong> {r.reason}
                  </div>
                ))}
              </div>
            )}

            <div style={S.kpis}>
              {sevCounts.MAYDAY > 0 && <div style={S.kpi}><div style={S.kpiN(SEV_COLORS.MAYDAY.fg)}>{sevCounts.MAYDAY}</div><div style={S.kpiL}>MAYDAY</div></div>}
              <div style={S.kpi}><div style={S.kpiN(SEV_COLORS.CRITICAL.fg)}>{sevCounts.CRITICAL || 0}</div><div style={S.kpiL}>Critical</div></div>
              <div style={S.kpi}><div style={S.kpiN(SEV_COLORS.HIGH.fg)}>{sevCounts.HIGH || 0}</div><div style={S.kpiL}>High</div></div>
              <div style={S.kpi}><div style={S.kpiN(SEV_COLORS.MEDIUM.fg)}>{sevCounts.MEDIUM || 0}</div><div style={S.kpiL}>Medium</div></div>
              <div style={S.kpi}><div style={S.kpiN(SEV_COLORS.LOW.fg)}>{sevCounts.LOW || 0}</div><div style={S.kpiL}>Low</div></div>
              <div style={S.kpi}><div style={S.kpiN("#e5e5e5")}>{files.length}</div><div style={S.kpiL}>Files</div></div>
              <div style={S.kpi}><div style={S.kpiN("#e5e5e5")}>{Object.keys(ips).length}</div><div style={S.kpiL}>Unique IPs</div></div>
            </div>

            {findings.length === 0 && (
              <div style={S.dropZone}>
                <div style={{fontSize:32, marginBottom:10}}>🔍</div>
                <div style={{color:"#aaa", marginBottom:12}}>Load a sysdiagnose file, log, CSV, or any text evidence</div>
                <button style={S.btn} onClick={() => inputRef.current?.click()}>+ Load File</button>
              </div>
            )}

            {elevatedFindings.filter(f => f.sev === "MAYDAY").slice(0,5).map(f => (
              <FindingCard key={f.id} f={f} S={S} expanded={expanded} setExpanded={setExpanded} getScenarioMatches={getScenarioMatches} />
            ))}
            {elevatedFindings.filter(f => f.sev === "CRITICAL").slice(0,5).map(f => (
              <FindingCard key={f.id} f={f} S={S} expanded={expanded} setExpanded={setExpanded} getScenarioMatches={getScenarioMatches} />
            ))}
          </div>
        )}

        {tab === "findings" && (
          <div>
            <div style={{display:"flex", gap:8, marginBottom:12, flexWrap:"wrap"}}>
              <input style={{...S.input, flex:1, minWidth:140}} placeholder="Search..." value={search} onChange={e => setSearch(e.target.value)} />
              <select style={S.input} value={sevFilter} onChange={e => setSevFilter(e.target.value)}>
                <option value="">All severities</option>
                <option value="MAYDAY">MAYDAY</option>
                <option value="CRITICAL">Critical</option>
                <option value="HIGH">High</option>
                <option value="MEDIUM">Medium</option>
                <option value="LOW">Low</option>
              </select>
            </div>
            {filteredFindings.length === 0 ? (
              <div style={S.empty}>No findings match.</div>
            ) : (
              filteredFindings.map(f => <FindingCard key={f.id} f={f} S={S} expanded={expanded} setExpanded={setExpanded} getScenarioMatches={getScenarioMatches} />)
            )}
          </div>
        )}

        {tab === "files" && (
          <div>
            {files.length === 0 ? (
              <div style={S.empty}>No files loaded.</div>
            ) : (
              files.map(f => (
                <div key={f.id} style={{...S.card("LOW"), borderLeft:"3px solid #4a9eff"}}>
                  <div style={{fontWeight:600}}>{f.name}</div>
                  <div style={S.meta}>{(f.size/1048576).toFixed(2)} MB · {f.lineCount.toLocaleString()} lines · {f.findingCount} findings · {f.added.slice(0,19).replace("T"," ")}</div>
                </div>
              ))
            )}
          </div>
        )}

        {tab === "iocs" && (
          <div>
            <div style={{fontSize:13, fontWeight:600, color:"#888", marginBottom:8}}>IP Addresses ({Object.keys(ips).length})</div>
            {Object.keys(ips).length === 0 ? <div style={S.empty}>No IPs extracted yet.</div> :
              Object.entries(ips).sort((a,b) => b[1].count - a[1].count).slice(0,50).map(([ip,v]) => (
                <div key={ip} style={{...S.card("LOW"), borderLeft:"3px solid #4a9eff"}}>
                  <div style={{fontFamily:"monospace", fontSize:12}}>{ip}</div>
                  <div style={S.meta}>seen in: {Array.from(v.files).join(", ")}</div>
                </div>
              ))
            }
            <div style={{fontSize:13, fontWeight:600, color:"#888", marginTop:16, marginBottom:8}}>Emails ({Object.keys(emails).length})</div>
            {Object.keys(emails).length === 0 ? <div style={S.empty}>No emails extracted yet.</div> :
              Object.entries(emails).slice(0,50).map(([em,v]) => (
                <div key={em} style={{...S.card("LOW"), borderLeft:"3px solid #4a9eff"}}>
                  <div style={{fontFamily:"monospace", fontSize:12}}>{em}</div>
                  <div style={S.meta}>seen in: {Array.from(v.files).join(", ")}</div>
                </div>
              ))
            }
          </div>
        )}
      </div>

      <input type="file" ref={inputRef} style={{display:"none"}} multiple onChange={e => handleFiles(Array.from(e.target.files))} />
      <input type="file" ref={loadRef} style={{display:"none"}} accept=".json" onChange={e => e.target.files[0] && restoreSnapshot(e.target.files[0])} />
    </div>
  );
}

function FindingCard({ f, S, expanded, setExpanded, getScenarioMatches }) {
  const open = expanded[f.id];
  const matches = open ? getScenarioMatches(f) : [];
  const wasElevated = f.originalSev && f.originalSev !== f.sev;

  return (
    <div style={S.card(f.sev)}>
      <div style={S.cardHead} onClick={() => setExpanded(p => ({ ...p, [f.id]: !p[f.id] }))}>
        <div style={{flex:1, minWidth:0}}>
          <div style={S.cardTitle}>{f.label}</div>
          <div style={S.meta}>
            {f.cat} · {f.count}x · {f.file}
            {wasElevated && <span style={{marginLeft:8, color:"#fca5a5"}}>⬆ elevated from {f.originalSev}</span>}
          </div>
        </div>
        <div style={{display:"flex", gap:6, alignItems:"center"}}>
          <span style={S.pill(f.sev)}>{f.sev}</span>
          <span style={{color:"#666"}}>{open ? "▴" : "▾"}</span>
        </div>
      </div>

      {open && (
        <div>
          {wasElevated && f.elevatedBy && f.elevatedBy.length > 0 && (
            <div style={{...S.section, padding:10, background:"#0a0a0a", border:"1px solid #451a1a", borderRadius:4}}>
              <div style={{...S.sectionLabel, color:"#fca5a5"}}>Why elevated {f.originalSev} → {f.sev}</div>
              {f.elevatedBy.map((e,i) => (
                <div key={i} style={{...S.sectionText, marginTop:4}}>
                  <strong>{e.description}:</strong> {e.reason}
                </div>
              ))}
            </div>
          )}
          <div style={S.section}>
            <div style={S.sectionLabel}>Fact</div>
            <div style={S.sectionText}>{f.fact}</div>
          </div>
          <div style={S.section}>
            <div style={{...S.sectionLabel, color:"#fdba74"}}>Mechanism</div>
            <div style={S.sectionText}>{f.mechanism}</div>
          </div>
          <div style={S.section}>
            <div style={{...S.sectionLabel, color:"#fca5a5"}}>Why it matters on a personal device</div>
            <div style={S.sectionText}>{f.whyCritical}</div>
          </div>
          {matches.length > 0 && (
            <div style={S.section}>
              <div style={{...S.sectionLabel, color:"#93c5fd"}}>Other findings that fit the same scenario</div>
              <div style={{marginTop:4}}>
                {matches.map(m => (
                  <div key={m.id} style={{fontSize:11.5, color:"#bbb", padding:"3px 0"}}>
                    <span style={S.pill(m.sev)}>{m.sev}</span> {m.label} ({m.file})
                  </div>
                ))}
              </div>
            </div>
          )}
          <div style={S.section}>
            <div style={{...S.sectionLabel, color:"#86efac"}}>What to do / document</div>
            <div style={S.sectionText}>{f.fix}</div>
          </div>
          {f.examples.length > 0 && (
            <div style={{marginTop:8, background:"#0a0a0a", border:"1px solid #222", borderRadius:4, padding:8, fontFamily:"monospace", fontSize:10.5, color:"#aaa", wordBreak:"break-all", whiteSpace:"pre-wrap"}}>
              {f.examples.map((ex,i) => (
                <div key={i} style={{marginBottom:4}}>line {ex.line}: {ex.text}</div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<TruthFinderV5 />);
</script>

</body>
</html>
