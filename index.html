<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Truth Finder v7 — Gold Edition</title>
<style>
  :root {
    --bg: #0a0a0a;
    --panel: #111111;
    --panel2: #161616;
    --border: #2a2418;
    --accent: #c9a961;
    --accent2: #8a7234;
    --text: #e8e3d5;
    --dim: #8a8270;
    --crit: #a83232;
    --high: #b8702a;
    --med: #a88830;
    --low: #3a6b8a;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }
  #root { min-height: 100vh; }

/* Sticky top */
.topbar {
position: sticky; top: 0; z-index: 100;
background: linear-gradient(180deg, #0e0c08 0%, #0a0907 100%);
border-bottom: 1px solid var(–border);
padding: 8px 10px;
}
.ribbon {
display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
}
.logo {
font-weight: 700; letter-spacing: 0.5px; font-size: 14px;
color: var(–accent);
margin-right: auto;
display: flex; align-items: center; gap: 6px;
}
.logo small { color: var(–dim); font-weight: 400; font-size: 10px; letter-spacing: 1px;}
.btn {
background: #1a1610;
color: var(–text);
border: 1px solid var(–border);
padding: 7px 11px;
border-radius: 6px;
font-size: 12px;
font-weight: 500;
cursor: pointer;
white-space: nowrap;
-webkit-appearance: none;
}
.btn:active { background: #221c12; }
.btn.primary { background: var(–accent2); color: #0a0a0a; border-color: var(–accent); font-weight: 600;}
.btn.ghost { background: transparent; }
.btn.danger { color: var(–crit); border-color: #4a1818; }
.btn:disabled { opacity: 0.4; }

.filebar {
margin-top: 8px;
display: flex; gap: 6px; align-items: center;
padding: 6px 8px;
background: var(–panel2);
border: 1px solid var(–border);
border-radius: 6px;
}
.filebar input[type=file] { display: none; }
.filebar .fname { font-size: 11px; color: var(–dim); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;}

/* Layout */
.container { display: flex; min-height: calc(100vh - 110px); }
.sidenav {
width: 180px; flex-shrink: 0;
background: var(–panel);
border-right: 1px solid var(–border);
padding: 8px 6px;
}
.sidenav.collapsed { display: none; }
.navgroup { font-size: 10px; color: var(–dim); text-transform: uppercase; padding: 8px 8px 4px; letter-spacing: 1px; }
.navitem {
display: block;
padding: 8px 10px;
font-size: 13px;
color: var(–text);
cursor: pointer;
border-radius: 5px;
border: 1px solid transparent;
}
.navitem.active { background: #1a1510; color: var(–accent); border-color: var(–border); }
.navitem:active { background: #221b10; }

.main { flex: 1; padding: 12px; min-width: 0; }
.navtoggle { display: none; }

@media (max-width: 720px) {
.sidenav { position: fixed; top: 110px; left: 0; bottom: 0; z-index: 90; width: 220px; }
.sidenav.collapsed { display: none; }
.navtoggle { display: inline-flex; }
.main { padding: 10px; }
}

/* Panels */
.panel {
background: var(–panel);
border: 1px solid var(–border);
border-radius: 8px;
padding: 12px;
margin-bottom: 12px;
}
.panel h2 { margin: 0 0 10px; font-size: 15px; color: var(–accent); font-weight: 600; letter-spacing: 0.3px;}
.panel h3 { margin: 12px 0 8px; font-size: 13px; color: var(–accent); font-weight: 600;}
.row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 8px; }
.stat {
background: var(–panel2);
border: 1px solid var(–border);
border-radius: 6px;
padding: 8px 10px;
flex: 1; min-width: 120px;
}
.stat .lbl { font-size: 10px; color: var(–dim); text-transform: uppercase; letter-spacing: 1px;}
.stat .val { font-size: 18px; color: var(–accent); font-weight: 600; margin-top: 2px;}

/* Tables */
.tablewrap { overflow-x: auto; -webkit-overflow-scrolling: touch; border: 1px solid var(–border); border-radius: 6px;}
table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 500px;}
th, td { padding: 7px 9px; text-align: left; border-bottom: 1px solid var(–border); vertical-align: top;}
th { background: var(–panel2); color: var(–accent); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; position: sticky; top: 0;}
tr:last-child td { border-bottom: none; }
td.mono { font-family: ui-monospace, “SF Mono”, Menlo, monospace; font-size: 11px; color: var(–dim); }

/* Severity badges */
.sev { display: inline-block; padding: 2px 7px; border-radius: 3px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;}
.sev.crit { background: var(–crit); color: #fff; }
.sev.high { background: var(–high); color: #fff; }
.sev.med { background: var(–med); color: #0a0a0a; }
.sev.low { background: var(–low); color: #fff; }

/* Forms */
label { display: block; font-size: 11px; color: var(–dim); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.5px;}
input[type=text], input[type=number], input[type=date], textarea, select {
width: 100%;
background: var(–panel2);
color: var(–text);
border: 1px solid var(–border);
border-radius: 5px;
padding: 8px 10px;
font-size: 14px;
font-family: inherit;
-webkit-appearance: none;
}
textarea { min-height: 70px; resize: vertical; }
.formgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
@media (max-width: 600px) { .formgrid { grid-template-columns: 1fr; } }
.formfield { margin-bottom: 8px; }
.formfield.full { grid-column: 1 / -1; }

/* Toolbar */
.toolbar { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
.toolbar input[type=text] { flex: 1; min-width: 150px; }

/* Progress */
.progress { height: 4px; background: #1a1610; border-radius: 2px; overflow: hidden; margin-top: 6px;}
.progress > div { height: 100%; background: var(–accent); transition: width 0.2s;}

/* Toast */
.toast {
position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
background: #1a1610; color: var(–accent);
border: 1px solid var(–accent2);
padding: 10px 16px; border-radius: 6px;
z-index: 200; font-size: 13px;
box-shadow: 0 4px 16px rgba(0,0,0,0.5);
max-width: 90%;
}

/* Print */
@media print {
.topbar, .sidenav, .toolbar, .btn { display: none !important; }
.main { padding: 0; }
body { background: #fff; color: #000; }
.panel { border: 1px solid #999; background: #fff; page-break-inside: avoid; }
.panel h2, .panel h3 { color: #000; }
th { background: #eee; color: #000; }
.stat { background: #f5f5f5; }
.stat .val { color: #000; }
.sev.crit { background: #a83232; }
.sev.high { background: #b8702a; }
.sev.med { background: #a88830; color: #000; }
.sev.low { background: #3a6b8a; }
}

.empty { color: var(–dim); text-align: center; padding: 24px; font-style: italic;}
.pill { display: inline-block; padding: 1px 6px; border-radius: 3px; background: var(–panel2); border: 1px solid var(–border); font-size: 10px; color: var(–dim); margin-right: 4px;}
.helptext { font-size: 11px; color: var(–dim); margin-top: 4px; }
.divider { height: 1px; background: var(–border); margin: 12px 0; }
details { margin: 6px 0; }
summary { cursor: pointer; color: var(–accent); font-size: 12px; padding: 4px 0; }
.codebox {
background: #0a0807; border: 1px solid var(–border); border-radius: 4px;
padding: 6px 8px; font-family: ui-monospace, monospace; font-size: 10px;
color: var(–dim); white-space: pre-wrap; word-break: break-all;
max-height: 120px; overflow: auto;
}
</style>

</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script type="text/babel">
const { useState, useMemo, useEffect, useRef, useCallback } = React;

// ============================================================
// PATTERN LIBRARY (30+ detections from v4)
// ============================================================
const PATTERNS = [
// Identity / takeover
{ id: ‘gh_takeover’, re: /password\s+(was\s+)?changed|2FA\s+enabled|recovery\s+codes\s+(downloaded|generated)|security\s+key\s+registered/i, sev: ‘crit’, cat: ‘Account Takeover’, label: ‘GitHub/account takeover indicators’},
{ id: ‘oauth_revoke’, re: /OAuth\s+token\s+revoked|app\s+access\s+revoked|authorized\s+application\s+removed/i, sev: ‘high’, cat: ‘Account Takeover’, label: ‘OAuth/app access revocation’},
{ id: ‘unauth_signin’, re: /(unauthorized|suspicious|unrecognized)\s+sign[- ]?in|new\s+device\s+signed\s+in/i, sev: ‘high’, cat: ‘Account Takeover’, label: ‘Unauthorized sign-in event’},

// CKKS / iCloud
{ id: ‘bypassPCS’, re: /bypassPCSEncryption[^a-z]*(?:=|:)?\s*(?:1|true|YES)/i, sev: ‘crit’, cat: ‘CKKS/iCloud’, label: ‘bypassPCSEncryption active’},
{ id: ‘inCircle0’, re: /inCircle[^a-z]*(?:=|:)?\s*0/i, sev: ‘crit’, cat: ‘CKKS/iCloud’, label: ‘Device excluded from iCloud security circle (inCircle:0)’},
{ id: ‘tlk_shares’, re: /heal-tlk-shares|TLK\s+share|tlkShare/i, sev: ‘high’, cat: ‘CKKS/iCloud’, label: ‘TLK share / heal-tlk-shares activity’},
{ id: ‘rotating_ckids’, re: /CloudKit.*account.*identifier|ckAccountID/i, sev: ‘med’, cat: ‘CKKS/iCloud’, label: ‘CloudKit account identifier reference’},
{ id: ‘oqe_drain’, re: /OQE.*items|itemsyncing.*paused/i, sev: ‘high’, cat: ‘CKKS/iCloud’, label: ‘Passwords OQE drain / itemsyncing paused’},
{ id: ‘userviews_disabled’, re: /userViews.*(?:disabled|DISABLED)/i, sev: ‘high’, cat: ‘CKKS/iCloud’, label: ‘userViews policy disabled’},
{ id: ‘findmy_mismatch’, re: /FindMy.*(?:mismatch|send.*recv)/i, sev: ‘high’, cat: ‘CKKS/iCloud’, label: ‘FindMy zone send/recv mismatch’},
{ id: ‘sensitive_visible’, re: /SensitivePropertiesVisible[^a-z]*(?:=|:)?\s*(?:true|YES|1)/i, sev: ‘crit’, cat: ‘CKKS/iCloud’, label: ‘SensitivePropertiesVisible = true’},
{ id: ‘untrusted_tunnel’, re: /untrusted\s+tunnel|tunnel.*untrusted|CoreDevice.*tunnel/i, sev: ‘high’, cat: ‘CKKS/iCloud’, label: ‘CoreDevice untrusted tunnel service’},

// MDM / Profiles
{ id: ‘mdm_profile’, re: /MDM\s+profile|managedConfiguration|com.apple.mdm/i, sev: ‘high’, cat: ‘MDM/Profile’, label: ‘MDM profile reference’},
{ id: ‘tmobile_mdm’, re: /T-?Mobile.*(profile|managed|MDM)|com.tmobile/i, sev: ‘high’, cat: ‘MDM/Profile’, label: ‘T-Mobile managed/MDM reference’},
{ id: ‘azure_cert’, re: /Microsoft\s+Azure|azure.*cert|Microsoft\s+IT\s+TLS/i, sev: ‘high’, cat: ‘MDM/Profile’, label: ‘Microsoft Azure certificate on iOS’},
{ id: ‘share_ext_block’, re: /share\s+extension.*(?:block|disabled|suppress)|com.apple.share/i, sev: ‘med’, cat: ‘MDM/Profile’, label: ‘Share extension suppression’},
{ id: ‘cellular_cap’, re: /cellular.*(?:limit|cap|100\s*MB|transfer\s+limit)/i, sev: ‘med’, cat: ‘MDM/Profile’, label: ‘Cellular transfer cap’},

// Network / MAC
{ id: ‘private_addr_off’, re: /Private\s+(MAC\s+)?Address.*OFF|privateAddress.*false|wifi.privateAddress.*0/i, sev: ‘high’, cat: ‘Network’, label: ‘Private MAC Address OFF’},
{ id: ‘real_mac’, re: /\b(?:[0-9A-Fa-f]{2}[:-]){5}[0-9A-Fa-f]{2}\b/, sev: ‘low’, cat: ‘Network’, label: ‘MAC address present’},
{ id: ‘call_forward’, re: /call\s+forward|forwardingNumber|+1?214[0-9]{7}/i, sev: ‘high’, cat: ‘Network’, label: ‘Call forwarding indicator’},
{ id: ‘tmobile_ipv6’, re: /2607:fb90:[0-9a-f:]+/i, sev: ‘med’, cat: ‘Network’, label: ‘T-Mobile IPv6 (2607:fb90:) address’},

// Device / hardware
{ id: ‘serial_match’, re: /CW4XKX9QYM/i, sev: ‘high’, cat: ‘Device’, label: ‘Target iPhone serial CW4XKX9QYM’},
{ id: ‘udid_anon’, re: /UDID.*(?:anonymous|no\s+account|unattributed)/i, sev: ‘high’, cat: ‘Device’, label: ‘Anonymous/unattributed UDID’},
{ id: ‘diag_enroll’, re: /diagnostic.*enroll|enrolled.*diagnostic|MDMRegistered/i, sev: ‘high’, cat: ‘Device’, label: ‘Apple diagnostic enrollment’},

// Files / iCloud containers
{ id: ‘clouddocs_noclient’, re: /com.apple.CloudDocs.*(?:no\s+client|missing)/i, sev: ‘high’, cat: ‘Files’, label: ‘com.apple.CloudDocs no declared client’},
{ id: ‘notes_mislabel’, re: /com.apple.notes.*Settings|Settings.*com.apple.notes/i, sev: ‘med’, cat: ‘Files’, label: ‘com.apple.notes mislabeled as Settings’},
{ id: ‘productkit_b389’, re: /productkit.*b389|b389.*productkit/i, sev: ‘med’, cat: ‘Files’, label: ‘productkit b389 anomaly’},

// Auth / patterns
{ id: ‘auth_failure’, re: /UserAuthenticationFailure|authentication\s+failed.*retry/i, sev: ‘med’, cat: ‘Auth’, label: ‘Authentication failure / retry’},
{ id: ‘ext_id_mutation’, re: /ExternalIdentifierMutated|externalId.*changed/i, sev: ‘high’, cat: ‘Auth’, label: ‘External identifier mutation’},
{ id: ‘no_auth_session’, re: /no\s+auth\s+session|without\s+(?:auth|authentication)\s+session/i, sev: ‘high’, cat: ‘Auth’, label: ‘Action without auth session’},

// CVE / WebKit
{ id: ‘webkit_sop’, re: /CVE-2026-20643|WebKit.*Same\s*Origin|SOP\s+bypass/i, sev: ‘crit’, cat: ‘CVE’, label: ‘WebKit SOP bypass (CVE-2026-20643)’},
{ id: ‘cve_generic’, re: /CVE-\d{4}-\d{4,7}/i, sev: ‘med’, cat: ‘CVE’, label: ‘CVE reference’},

// IOCs (network/file)
{ id: ‘ipv4’, re: /\b(?:\d{1,3}.){3}\d{1,3}\b/, sev: ‘low’, cat: ‘IOC’, label: ‘IPv4 address’},
{ id: ‘ipv6’, re: /\b(?:[0-9a-f]{1,4}:){2,7}[0-9a-f]{1,4}\b/i, sev: ‘low’, cat: ‘IOC’, label: ‘IPv6 address’},
{ id: ‘domain’, re: /\b[a-z0-9-]+.(?:com|net|org|io|co|app|dev|cloud|apple.com)\b/i, sev: ‘low’, cat: ‘IOC’, label: ‘Domain reference’},
{ id: ‘hash’, re: /\b[a-f0-9]{32,64}\b/i, sev: ‘low’, cat: ‘IOC’, label: ‘Hash (MD5/SHA)’},
];

const SEV_RANK = { crit: 4, high: 3, med: 2, low: 1 };
const SEV_LABEL = { crit: ‘CRITICAL’, high: ‘HIGH’, med: ‘MEDIUM’, low: ‘LOW’ };

const SEV_EXPLAIN = {
crit: {
plain: ‘Confirmed indicator of unauthorized access, key compromise, or security-circle exclusion. Treat as primary evidence.’,
simple: ‘A red-flag finding. The system is showing signs that someone or something is bypassing normal protections.’
},
high: {
plain: ‘Strong anomaly with documented attribution patterns. Requires correlation with timeline and actor records.’,
simple: ‘A serious finding. Something unusual happened that maps to known attack or surveillance behavior.’
},
med: {
plain: ‘Notable anomaly worth tracking. May be benign in isolation but pattern-relevant in aggregate.’,
simple: ‘A finding to keep an eye on. Alone it might be nothing — together with others it can mean something.’
},
low: {
plain: ‘Indicator-of-compromise candidate (IPs, hashes, MAC addresses). Use for cross-file correlation.’,
simple: ‘A piece of raw data — an address, a code — useful for connecting the dots between files.’
}
};

// ============================================================
// HELPERS
// ============================================================
const uid = (p=‘id’) => `${p}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2,7)}`;
const nowISO = () => new Date().toISOString();

const initialDB = () => ({
meta: { created: nowISO(), version: ‘v7’, name: ‘Truth Finder Database’ },
findings: [],
sources: [],
timeline: [],
actors: [],
iocs: [],
files: [],
});

const downloadBlob = (data, filename, type=‘application/json’) => {
const blob = new Blob([data], { type });
const url = URL.createObjectURL(blob);
const a = document.createElement(‘a’);
a.href = url; a.download = filename;
document.body.appendChild(a); a.click();
document.body.removeChild(a);
setTimeout(() => URL.revokeObjectURL(url), 1000);
};

// ============================================================
// STREAMING FILE INGEST
// ============================================================
async function ingestFile(file, onProgress, onChunk) {
const reader = file.stream().getReader();
const decoder = new TextDecoder(‘utf-8’, { fatal: false });
let received = 0;
let buffer = ‘’;
let lineNo = 0;
const total = file.size || 1;

while (true) {
const { done, value } = await reader.read();
if (done) break;
received += value.length;
buffer += decoder.decode(value, { stream: true });
let nl;
while ((nl = buffer.indexOf(’\n’)) >= 0) {
const line = buffer.slice(0, nl);
buffer = buffer.slice(nl + 1);
lineNo++;
onChunk(line, lineNo);
}
onProgress(Math.min(100, Math.round((received / total) * 100)));
await new Promise(r => setTimeout(r, 0));
}
if (buffer.length) {
lineNo++;
onChunk(buffer, lineNo);
}
onProgress(100);
return lineNo;
}

function scanLine(line, fileName, fileId) {
const hits = [];
for (const p of PATTERNS) {
const m = line.match(p.re);
if (m) {
hits.push({
patternId: p.id,
label: p.label,
category: p.cat,
severity: p.sev,
match: m[0].slice(0, 200),
fileName,
fileId,
});
}
}
return hits;
}

// ============================================================
// COMPONENTS
// ============================================================

function Topbar({ onLoad, onSave, onRestore, onPrint, onToggleNav, fileName, busy, progress }) {
const fileRef = useRef(null);
const restoreRef = useRef(null);
return (
<div className="topbar">
<div className="ribbon">
<div className="logo">
◆ Truth Finder <small>v7 · GOLD</small>
</div>
<button className="btn navtoggle ghost" onClick={onToggleNav}>☰</button>
<button className=“btn primary” onClick={() => fileRef.current?.click()} disabled={busy}>
{busy ? `Loading ${progress}%` : ‘Load File’}
</button>
<button className="btn" onClick={onSave}>Save DB</button>
<button className=“btn” onClick={() => restoreRef.current?.click()}>Restore</button>
<button className="btn" onClick={onPrint}>Print PDF</button>
<input ref={fileRef} type=“file” accept=”.txt,.log,.json,.csv,.xml,.plist,.ips,.crash,*/*” onChange={(e) => {
const f = e.target.files?.[0];
if (f) onLoad(f);
e.target.value = ‘’;
}} />
<input ref={restoreRef} type=“file” accept=”.json,application/json” onChange={(e) => {
const f = e.target.files?.[0];
if (f) onRestore(f);
e.target.value = ‘’;
}} />
</div>
<div className="filebar">
<span className="pill">FILE</span>
<span className="fname">{fileName || ‘(no file loaded — tap Load File to ingest)’}</span>
{busy && <div style={{width:80}}><div className="progress"><div style={{width: progress + ‘%’}} /></div></div>}
</div>
</div>
);
}

function Nav({ view, setView, collapsed }) {
const items = [
{ group: ‘Tables’, items: [
[‘findings’,‘Findings’],[‘sources’,‘Sources’],[‘timeline’,‘Timeline’],
[‘actors’,‘Actors’],[‘iocs’,‘IOCs’],[‘files’,‘Files’]
]},
{ group: ‘Forms’, items: [
[‘new_finding’,’+ New Finding’],[‘new_actor’,’+ New Actor’],[‘new_ioc’,’+ New IOC’]
]},
{ group: ‘Queries’, items: [
[‘query_builder’,‘Query Builder’],[‘critical_only’,‘Critical Only’],[‘cross_patterns’,‘Cross-File Patterns’]
]},
{ group: ‘Reports’, items: [
[‘report_dashboard’,‘Dashboard’],[‘report_trends’,‘Time-Series Trends’],
[‘report_severity’,‘Severity Report’],[‘report_combos’,‘Cross-File Combos’]
]},
];
return (
<div className={‘sidenav’ + (collapsed ? ’ collapsed’ : ‘’)}>
{items.map(g => (
<div key={g.group}>
<div className="navgroup">{g.group}</div>
{g.items.map(([k, l]) => (
<div key={k} className={’navitem ’ + (view === k ? ‘active’ : ‘’)} onClick={() => setView(k)}>{l}</div>
))}
</div>
))}
</div>
);
}

function SeverityBadge({ s }) {
return <span className={’sev ’ + s}>{SEV_LABEL[s] || s}</span>;
}

function Table({ columns, rows, empty=‘No records’ }) {
if (!rows.length) return <div className="empty">{empty}</div>;
return (
<div className="tablewrap">
<table>
<thead><tr>{columns.map(c => <th key={c.key}>{c.label}</th>)}</tr></thead>
<tbody>
{rows.map((r, i) => (
<tr key={r.id || i}>
{columns.map(c => <td key={c.key} className={c.mono ? ‘mono’ : ‘’}>{c.render ? c.render(r) : (r[c.key] ?? ‘’)}</td>)}
</tr>
))}
</tbody>
</table>
</div>
);
}

function FindingsView({ db, setDB }) {
const [q, setQ] = useState(’’);
const [sev, setSev] = useState(‘all’);
const filtered = useMemo(() => {
return db.findings.filter(f => {
if (sev !== ‘all’ && f.severity !== sev) return false;
if (q) {
const s = q.toLowerCase();
if (!(f.label||’’).toLowerCase().includes(s) &&
!(f.category||’’).toLowerCase().includes(s) &&
!(f.match||’’).toLowerCase().includes(s) &&
!(f.fileName||’’).toLowerCase().includes(s)) return false;
}
return true;
}).sort((a,b) => (SEV_RANK[b.severity]||0) - (SEV_RANK[a.severity]||0));
}, [db.findings, q, sev]);

const remove = (id) => setDB(d => ({…d, findings: d.findings.filter(f => f.id !== id)}));

return (
<div className="panel">
<h2>Findings ({filtered.length} / {db.findings.length})</h2>
<div className="toolbar">
<input type=“text” placeholder=“Search findings…” value={q} onChange={e => setQ(e.target.value)} />
<select value={sev} onChange={e => setSev(e.target.value)}>
<option value="all">All severities</option>

function SimpleTableView({ title, rows, columns, empty }) {
const [q, setQ] = useState(’’);
const filtered = useMemo(() => {
if (!q) return rows;
const s = q.toLowerCase();
return rows.filter(r => Object.values(r).some(v => String(v||’’).toLowerCase().includes(s)));
}, [rows, q]);
return (
<div className="panel">
<h2>{title} ({filtered.length})</h2>
<div className="toolbar">
<input type=“text” placeholder=“Search…” value={q} onChange={e => setQ(e.target.value)} />
</div>
<Table columns={columns} rows={filtered} empty={empty}/>
</div>
);
}

function QueryBuilder({ db }) {
const [field, setField] = useState(‘label’);
const [op, setOp] = useState(‘contains’);
const [val, setVal] = useState(’’);
const [target, setTarget] = useState(‘findings’);
const [results, setResults] = useState([]);
const run = () => {
const data = db[target] || [];
const s = val.toLowerCase();
const out = data.filter(r => {
const v = String(r[field] ?? ‘’).toLowerCase();
if (op === ‘contains’) return v.includes(s);
if (op === ‘equals’) return v === s;
if (op === ‘starts’) return v.startsWith(s);
if (op === ‘regex’) { try { return new RegExp(val, ‘i’).test(String(r[field]||’’)); } catch { return false; } }
return false;
});
setResults(out);
};
return (
<div className="panel">
<h2>Query Builder</h2>
<div className="formgrid">
<div className="formfield"><label>Table</label>
<select value={target} onChange={e=>setTarget(e.target.value)}>
<option value="findings">Findings</option><option value="sources">Sources</option>
<option value="timeline">Timeline</option><option value="actors">Actors</option>
<option value="iocs">IOCs</option><option value="files">Files</option>
</select>
</div>
<div className="formfield"><label>Field</label>
<input type=“text” value={field} onChange={e=>setField(e.target.value)} placeholder=“label, category, severity…” />
</div>
<div className="formfield"><label>Operator</label>
<select value={op} onChange={e=>setOp(e.target.value)}>
<option value="contains">contains</option><option value="equals">equals</option>
<option value="starts">starts with</option><option value="regex">regex</option>
</select>
</div>
<div className="formfield"><label>Value</label><input type=“text” value={val} onChange={e=>setVal(e.target.value)}/></div>
</div>
<button className="btn primary" onClick={run}>Run Query</button>
<div className="divider" />
<div className="helptext">{results.length} result(s)</div>
<div className="codebox">{JSON.stringify(results.slice(0,50), null, 2)}</div>
</div>
);
}

function CriticalOnly({ db }) {

<div className="panel">
<h2>Critical Only ({crit.length})</h2>
<Table

{ key: ‘label’, label: ‘Finding’ },
{ key: ‘category’, label: ‘Category’ },
{ key: ‘fileName’, label: ‘Source’, mono: true },
{ key: ‘match’, label: ‘Match’, mono: true, render: r => (r.match||’’).slice(0,100) },
]}
rows={crit}
empty=“No critical findings.”
/>
</div>
);
}

function CrossPatterns({ db }) {
// Find patterns that appear across multiple files
const patternFiles = {};
db.findings.forEach(f => {
if (!f.patternId) return;
if (!patternFiles[f.patternId]) patternFiles[f.patternId] = { label: f.label, severity: f.severity, files: new Set(), count: 0 };
patternFiles[f.patternId].files.add(f.fileName || ‘unknown’);
patternFiles[f.patternId].count++;
});
const cross = Object.entries(patternFiles)
.map(([id, v]) => ({ id, …v, fileCount: v.files.size, fileList: […v.files].join(’, ’) }))
.filter(r => r.fileCount > 1)
.sort((a,b) => b.fileCount - a.fileCount || (SEV_RANK[b.severity]||0) - (SEV_RANK[a.severity]||0));
return (
<div className="panel">
<h2>Cross-File Patterns ({cross.length})</h2>
<div className="helptext">Patterns matched in 2+ source files. Strong correlation candidates.</div>
<Table
columns={[
{ key: ‘severity’, label: ‘Sev’, render: r => <SeverityBadge s={r.severity}/> },
{ key: ‘label’, label: ‘Pattern’ },
{ key: ‘fileCount’, label: ‘Files’ },
{ key: ‘count’, label: ‘Hits’ },
{ key: ‘fileList’, label: ‘Source files’, mono: true },
]}
rows={cross}
empty=“No cross-file patterns yet. Load 2+ files to detect.”
/>
</div>
);
}

function ReportTrends({ db }) {
// Bucket findings by day (createdAt or timeline date)
const buckets = {};
db.findings.forEach(f => {
const d = (f.createdAt || ‘’).slice(0,10) || ‘undated’;
buckets[d] = buckets[d] || { d, crit:0, high:0, med:0, low:0, total:0 };
buckets[d][f.severity] = (buckets[d][f.severity]||0) + 1;
buckets[d].total++;
});
const rows = Object.values(buckets).sort((a,b) => a.d.localeCompare(b.d));
const max = Math.max(1, …rows.map(r => r.total));
return (
<div className="panel">
<h2>Time-Series Trends</h2>
<div className="helptext">Findings by ingestion date. Bar shows total per day.</div>
{!rows.length && <div className="empty">No data yet.</div>}
{rows.map(r => (
<div key={r.d} style={{marginBottom:6}}>
<div style={{display:‘flex’,justifyContent:‘space-between’,fontSize:11,color:‘var(–dim)’}}>
<span>{r.d}</span>
<span>{r.total} ({r.crit}C / {r.high}H / {r.med}M / {r.low}L)</span>
</div>
<div style={{height:10,background:’#1a1610’,borderRadius:2,overflow:‘hidden’,display:‘flex’}}>
<div style={{width: (r.crit/max*100)+’%’,background:‘var(–crit)’}}/>
<div style={{width: (r.high/max*100)+’%’,background:‘var(–high)’}}/>
<div style={{width: (r.med/max*100)+’%’,background:‘var(–med)’}}/>
<div style={{width: (r.low/max*100)+’%’,background:‘var(–low)’}}/>
</div>
</div>
))}
</div>
);
}

function ReportCombos({ db }) {
// Find combinations of patterns that co-occur in same file
const fileMap = {};
db.findings.forEach(f => {
const k = f.fileName || ‘unknown’;
fileMap[k] = fileMap[k] || new Set();
if (f.patternId) fileMap[k].add(f.patternId);
});
const combos = {};
Object.entries(fileMap).forEach(([file, set]) => {
const arr = […set].sort();
for (let i=0;i<arr.length;i++) for (let j=i+1;j<arr.length;j++) {
const k = arr[i] + ’ + ’ + arr[j];
combos[k] = combos[k] || { combo: k, files: new Set() };
combos[k].files.add(file);
}
});
const rows = Object.values(combos)
.map(c => ({ combo: c.combo, fileCount: c.files.size, files: […c.files].join(’, ’) }))
.filter(r => r.fileCount >= 2)
.sort((a,b) => b.fileCount - a.fileCount)
.slice(0, 50);
return (
<div className="panel">
<h2>Cross-File Combos ({rows.length})</h2>
<div className="helptext">Pattern pairs that co-occur in 2+ files. Top 50 shown.</div>
<Table
columns={[
{ key:‘combo’, label:‘Pattern Pair’, mono:true },
{ key:‘fileCount’, label:‘Files’ },
{ key:‘files’, label:‘In files’, mono:true },
]}
rows={rows}
empty=“No multi-file combos yet.”
/>
</div>
);
}

// ============================================================
// APP
// ============================================================
function App() {
const [db, setDB] = useState(initialDB);
const [view, setView] = useState(‘report_dashboard’);
const [navCollapsed, setNavCollapsed] = useState(window.innerWidth < 720);
const [busy, setBusy] = useState(false);
const [progress, setProgress] = useState(0);
const [currentFile, setCurrentFile] = useState(’’);
const [toastMsg, setToastMsg] = useState(’’);

const toast = useCallback((msg) => {
setToastMsg(msg);
setTimeout(() => setToastMsg(’’), 2400);
}, []);

const onLoad = useCallback(async (file) => {
setBusy(true); setProgress(0); setCurrentFile(file.name);
const fileId = uid(‘file’);
const collected = [];
const iocsCollected = [];
try {
const totalLines = await ingestFile(file,
(p) => setProgress(p),
(line, lineNo) => {
const hits = scanLine(line, file.name, fileId);
for (const h of hits) {
collected.push({ …h, id: uid(‘find’), lineNo, createdAt: nowISO(), source: ‘auto’ });
if (h.category === ‘IOC’) {
iocsCollected.push({
id: uid(‘ioc’), type: h.patternId.replace(’_’,’’), value: h.match, context: `${file.name}:${lineNo}`, severity: ‘low’, createdAt: nowISO()
});
}
}
}
);
setDB(d => ({
…d,
files: […d.files, { id: fileId, name: file.name, size: file.size, lines: totalLines, ingestedAt: nowISO(), hits: collected.length }],
findings: […d.findings, …collected],
iocs: […d.iocs, …iocsCollected],
sources: […d.sources, { id: uid(‘src’), name: file.name, type: ‘file’, addedAt: nowISO(), fileId }],
}));
toast(`Ingested ${file.name} — ${collected.length} hits across ${totalLines} lines`);
setView(‘findings’);
} catch (e) {
toast(’Ingest error: ’ + (e?.message || ‘unknown’));
} finally {
setBusy(false); setProgress(0);
}
}, [toast]);

const onSave = useCallback(() => {
const data = JSON.stringify({ …db, exportedAt: nowISO() }, null, 2);
downloadBlob(data, `truthfinder_${new Date().toISOString().slice(0,10)}.json`);
toast(‘Database saved’);
}, [db, toast]);

const onRestore = useCallback(async (file) => {
try {
const txt = await file.text();
const parsed = JSON.parse(txt);
if (!parsed || typeof parsed !== ‘object’) throw new Error(‘Invalid JSON’);
setDB({
meta: parsed.meta || initialDB().meta,
findings: parsed.findings || [],
sources: parsed.sources || [],
timeline: parsed.timeline || [],
actors: parsed.actors || [],
iocs: parsed.iocs || [],
files: parsed.files || [],
});
toast(‘Database restored’);
} catch (e) {
toast(’Restore failed: ’ + (e?.message || ‘invalid file’));
}
}, [toast]);

const onPrint = useCallback(() => {
// Deferred html2pdf (loaded only if user prints) — use native print as primary
// This avoids breaking iOS Safari + Lockdown Mode
setView(‘report_dashboard’);
setTimeout(() => window.print(), 250);
}, []);

const renderView = () => {
switch (view) {
case ‘findings’: return <FindingsView db={db} setDB={setDB} />;
case ‘sources’: return <SimpleTableView title=“Sources” rows={db.sources} columns={[
{key:‘name’,label:‘Name’},{key:‘type’,label:‘Type’},{key:‘addedAt’,label:‘Added’,mono:true}
]} empty=“No sources.” />;
case ‘timeline’: return <SimpleTableView title=“Timeline” rows={db.timeline} columns={[
{key:‘when’,label:‘When’},{key:‘event’,label:‘Event’},{key:‘notes’,label:‘Notes’}
]} empty=“No timeline events. (Add via JSON restore or future form.)” />;
case ‘actors’: return <SimpleTableView title=“Actors” rows={db.actors} columns={[
{key:‘name’,label:‘Name’},{key:‘role’,label:‘Role’},{key:‘firstSeen’,label:‘First Seen’},{key:‘notes’,label:‘Notes’}
]} empty=“No actors yet.” />;
case ‘iocs’: return <SimpleTableView title=“IOCs” rows={db.iocs} columns={[
{key:‘type’,label:‘Type’},{key:‘value’,label:‘Value’,mono:true},
{key:‘severity’,label:‘Sev’,render:r=><SeverityBadge s={r.severity}/>},
{key:‘context’,label:‘Context’,mono:true}
]} empty=“No IOCs yet.” />;
case ‘files’: return <SimpleTableView title=“Files” rows={db.files} columns={[
{key:‘name’,label:‘Name’},{key:‘size’,label:‘Bytes’},{key:‘lines’,label:‘Lines’},
{key:‘hits’,label:‘Hits’},{key:‘ingestedAt’,label:‘Ingested’,mono:true}
]} empty=“No files ingested.” />;
case ‘new_finding’: return <NewFindingForm db={db} setDB={setDB} toast={toast}/>;
case ‘new_actor’: return <NewActorForm db={db} setDB={setDB} toast={toast}/>;
case ‘new_ioc’: return <NewIOCForm db={db} setDB={setDB} toast={toast}/>;
case ‘query_builder’: return <QueryBuilder db={db}/>;
case ‘critical_only’: return <CriticalOnly db={db}/>;
case ‘cross_patterns’: return <CrossPatterns db={db}/>;
case ‘report_dashboard’: return <ReportDashboard db={db}/>;
case ‘report_trends’: return <ReportTrends db={db}/>;
case ‘report_severity’: return <ReportSeverity db={db}/>;
case ‘report_combos’: return <ReportCombos db={db}/>;
default: return <ReportDashboard db={db}/>;
}
};

return (
<div>
<Topbar
onLoad={onLoad} onSave={onSave} onRestore={onRestore} onPrint={onPrint}
onToggleNav={() => setNavCollapsed(c => !c)}
fileName={currentFile} busy={busy} progress={progress}
/>
<div className="container">
<Nav view={view} setView={(v) => { setView(v); if (window.innerWidth < 720) setNavCollapsed(true); }} collapsed={navCollapsed}/>
<div className="main">{renderView()}</div>
</div>
{toastMsg && <div className="toast">{toastMsg}</div>}
</div>
);
}

ReactDOM.createRoot(document.getElementById(‘root’)).render(<App />);
</script>

</body>
</html>
